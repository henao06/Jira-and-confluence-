<style>
.mode-toggle {
  display: inline-flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
}
.mode-btn {
  padding: 6px 18px; font-size: 13px; font-weight: 500; cursor: pointer;
  background: none; border: none; color: var(--g5); transition: all .15s;
}
.mode-btn.active { background: var(--g8); color: #fff; }
.steps-list { display: flex; flex-direction: column; gap: 6px; }
.step-row   { display: flex; align-items: center; gap: 8px; }
.step-num   {
  min-width: 24px; height: 24px; border-radius: 50%; background: var(--g8);
  color: #fff; font-size: 11px; font-weight: 700; display: flex;
  align-items: center; justify-content: center; flex-shrink: 0;
}
.step-row input { flex: 1; }
.btn-rm {
  background: none; border: 1px solid var(--border); border-radius: 6px;
  color: var(--g4); font-size: 14px; width: 24px; height: 24px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.btn-rm:hover { background: #fee2e2; border-color: #fca5a5; color: #dc2626; }
.btn-add-step {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px; border-radius: 8px; border: 1px dashed var(--border);
  background: none; color: var(--g5); font-size: 12px; cursor: pointer;
  transition: all .15s; margin-top: 4px;
}
.btn-add-step:hover { border-color: var(--g5); color: var(--g7); background: var(--g0); }
.result-box {
  display: none; padding: 16px 20px; border-radius: 10px;
  border: 1.5px solid #6ee7b7; background: rgba(16,185,129,.08);
  font-size: 14px; align-items: center; gap: 12px; flex-wrap: wrap;
}
.result-box.show { display: flex; }
.result-box a { color: #059669; font-weight: 700; text-decoration: none; }
.result-box a:hover { text-decoration: underline; }
</style>

<script>
const JIRA_BASE = window.location.origin + '/jira';
const JIRA_HOST = 'liceopinoverde.atlassian.net';
const EPIC_KEY  = 'QAA-179';
const AUTH      = '';       // el proxy del servidor inyecta la auth
const configFiles = [];     // requerido por crearBugBG de bg_reporter.js

let uploadedFiles = [];
let modoActual    = 'texto';

// ── Draft persistence ─────────────────────────────────────────────────────────
let _db = null;
function _openDB() {
  return new Promise((res, rej) => {
    if (_db) { res(_db); return; }
    const r = indexedDB.open('act-draft', 1);
    r.onupgradeneeded = e => e.target.result.createObjectStore('files', { keyPath: 'id', autoIncrement: true });
    r.onsuccess = e => { _db = e.target.result; res(_db); };
    r.onerror   = e => rej(e.target.error);
  });
}
async function _saveFiles(files) {
  const db = await _openDB();
  const tx = db.transaction('files', 'readwrite');
  const st = tx.objectStore('files');
  st.clear();
  for (const f of files) st.add({ name: f.name, type: f.type, buf: await f.arrayBuffer() });
  return new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = e => rej(e.target.error); });
}
async function _loadFiles() {
  const db = await _openDB();
  return new Promise((res, rej) => {
    const r = db.transaction('files', 'readonly').objectStore('files').getAll();
    r.onsuccess = e => res(e.target.result.map(x => new File([x.buf], x.name, { type: x.type })));
    r.onerror   = e => rej(e.target.error);
  });
}
function _clearFiles() { _openDB().then(db => db.transaction('files','readwrite').objectStore('files').clear()).catch(()=>{}); }

function saveTextState() {
  const pasos = Array.from(document.querySelectorAll('#pasos-wrap .step-row input')).map(i => i.value);
  try {
    localStorage.setItem('act_draft', JSON.stringify({
      titulo:   document.getElementById('titulo').value,
      tipo:     document.getElementById('tipo-actividad')?.value || 'Tarea',
      modo:     modoActual,
      texto:    document.getElementById('texto-desc').value,
      pasos,
      bug:      document.getElementById('reportar-bug').checked,
      tech:     document.getElementById('reportar-tech')?.checked || false,
      fnqaa:    document.getElementById('registrarEnQAAFinalizada').checked,
      version:  document.getElementById('bg-version')?.value  || '',
      entorno:  document.getElementById('bg-entorno')?.value  || '',
      tipoBg:   document.getElementById('bg-tipo')?.value   || '',
      tipoTech: document.getElementById('tech-tipo')?.value || '',
    }));
  } catch {}
}

async function restoreState() {
  await loadTiposActividad();
  try {
    const raw = localStorage.getItem('act_draft');
    if (raw) {
      const d = JSON.parse(raw);
      if (d.titulo) document.getElementById('titulo').value = d.titulo;
      if (d.tipo) {
        const sel = document.getElementById('tipo-actividad');
        if (Array.from(sel.options).some(o => o.value === d.tipo)) sel.value = d.tipo;
      }
      if (d.modo && d.modo !== 'texto') setModo(d.modo);
      if (d.texto) document.getElementById('texto-desc').value = d.texto;
      if (d.pasos?.length) {
        const wrap = document.getElementById('pasos-wrap');
        wrap.innerHTML = d.pasos.map((v, i) =>
          `<div class="step-row"><div class="step-num">${i+1}</div>` +
          `<input type="text" class="inp" placeholder="Paso ${i+1}..." value="${v.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;')}">` +
          `<button class="btn-rm" onclick="removePaso(this)">×</button></div>`
        ).join('');
      }
      if (d.bug)  document.getElementById('reportar-bug').checked  = true;
      if (d.tech) document.getElementById('reportar-tech').checked = true;
      if (d.bug || d.tech) {
        toggleBgAssignee();
        document.getElementById('bg-tipo-wrap').style.display   = d.bug  ? 'flex' : 'none';
        document.getElementById('tech-tipo-wrap').style.display = d.tech ? 'flex' : 'none';
        if (d.bug) {
          await loadTiposProyecto('BG', 'bg-tipo', 'Error');
          const s = document.getElementById('bg-tipo');
          if (d.tipoBg && Array.from(s.options).some(o => o.value === d.tipoBg)) s.value = d.tipoBg;
        }
        if (d.tech) {
          await loadTiposProyecto('SP', 'tech-tipo', 'Tech Task');
          const s = document.getElementById('tech-tipo');
          if (d.tipoTech && Array.from(s.options).some(o => o.value === d.tipoTech)) s.value = d.tipoTech;
        }
        await loadBgVersions();
        if (d.version) document.getElementById('bg-version').value = d.version;
        if (d.entorno) document.getElementById('bg-entorno').value = d.entorno;
      }
      if (d.fnqaa) document.getElementById('registrarEnQAAFinalizada').checked = true;
    }
  } catch {}
  try {
    const files = await _loadFiles();
    if (files.length) { uploadedFiles = files; renderPreviews(true); }
  } catch {}
}

function clearDraft() {
  try { localStorage.removeItem('act_draft'); } catch {}
  _clearFiles();
}

// ── ADF helpers (requeridos por bg_reporter.js) ───────────────────────────────
function mkH(text, level=2) { return { type:'heading', attrs:{level}, content:[{type:'text',text}] }; }
function mkP(text)           { return { type:'paragraph', content:[{type:'text',text:text||'—'}] }; }
function mkB(text)           { return { type:'paragraph', content:[{type:'text',text,marks:[{type:'strong'}]}] }; }
function mkRule()            { return { type:'rule' }; }
function mkPanel(panelType, content) { return { type:'panel', attrs:{panelType}, content }; }
function mkOrderedList(items) {
  const safe = (items || []).filter(t => t != null && String(t).trim() !== '');
  if (!safe.length) return mkP('—');  // una lista vacía es ADF inválido
  return { type:'orderedList', content: safe.map(t => ({
    type:'listItem', content:[{ type:'paragraph', content:[{type:'text',text:String(t)}] }]
  }))};
}
function mkBulletList(items) {
  const safe = (items || []).filter(t => t != null && String(t).trim() !== '');
  if (!safe.length) return mkP('—');  // una lista vacía es ADF inválido
  return { type:'bulletList', content: safe.map(t => ({
    type:'listItem', content:[{ type:'paragraph', content:[{type:'text',text:String(t)}] }]
  }))};
}
function mkTableCell(text, isHeader=false) {
  return { type: isHeader ? 'tableHeader' : 'tableCell', attrs:{}, content:[{ type:'paragraph', content:[{type:'text',text:String(text||'—')}] }] };
}
function mkTableRow(label, value) {
  return { type:'tableRow', content:[mkTableCell(label,true), mkTableCell(String(value||'—'))] };
}
function mkTable(rows) {
  return { type:'table', attrs:{isNumberColumnEnabled:false, layout:'default'}, content:rows };
}

// ── Tipos de issue por proyecto (cada tablero tiene su propio catálogo) ────────
const tiposCargados = {};   // projectKey -> true cuando ya se pobló su selector

// Carga los issuetypes nivel 0 (no subtareas) de un proyecto en su <select>.
async function loadTiposProyecto(projectKey, selId, preferido = 'Tarea') {
  if (tiposCargados[projectKey]) return;
  const sel = document.getElementById(selId);
  if (!sel) return;
  try {
    const r = await fetch(`${JIRA_BASE}/rest/api/3/project/${projectKey}`, {
      headers: { 'Accept': 'application/json' }
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    // Solo tipos que pueden ser hijos directos de la Epic: nivel 0, no subtareas
    const tipos = (data.issueTypes || [])
      .filter(t => !t.subtask && t.hierarchyLevel === 0);
    if (!tipos.length) throw new Error('Sin tipos');
    const prev = sel.value || preferido;
    sel.innerHTML = tipos.map(t => `<option value="${t.name}">${t.name}</option>`).join('');
    sel.value = tipos.some(t => t.name === prev)      ? prev
              : tipos.some(t => t.name === preferido) ? preferido
              : tipos[0].name;
    tiposCargados[projectKey] = true;
  } catch(e) {
    console.warn(`[tipos ${projectKey}]`, e.message);
    tiposCargados[projectKey] = true; // el HTML ya tiene un fallback en el <select>
  }
}

// QAA es el tablero base de la actividad: siempre se carga.
async function loadTiposActividad() {
  return loadTiposProyecto('QAA', 'tipo-actividad', 'Tarea');
}

// ── BG: versiones y toggle ────────────────────────────────────────────────────
let bgVersionsLoaded = false;

async function loadBgVersions() {
  if (bgVersionsLoaded) return;
  const sel = document.getElementById('bg-version');
  sel.innerHTML = '<option value="">Cargando…</option>';
  try {
    const r = await fetch(`${JIRA_BASE}/rest/api/3/project/QAA/versions`, {
      headers: { 'Accept': 'application/json' }
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const versions = (await r.json())
      .filter(v => !v.archived)
      .sort((a, b) => b.name.localeCompare(a.name));
    if (!versions.length) throw new Error('Sin versiones');
    sel.innerHTML = '<option value="">Sin versión</option>' +
      versions.map(v => `<option value="${v.name}">${v.name}${v.released ? '' : ' ✦'}</option>`).join('');
    // Pre-seleccionar la versión activa (test-v más reciente no publicada)
    const activa = window.versionActual
      || versions.find(v => !v.released && v.name.startsWith('test-v'))?.name;
    if (activa) sel.value = activa;
    bgVersionsLoaded = true;
  } catch(e) {
    console.warn('[BG versions]', e.message);
    sel.innerHTML = '<option value="">Sin versión</option>';
    bgVersionsLoaded = true;
  }
}

function onReportToggle() {
  const bug  = document.getElementById('reportar-bug').checked;
  const tech = document.getElementById('reportar-tech').checked;
  toggleBgAssignee();
  document.getElementById('bg-tipo-wrap').style.display   = bug  ? 'flex' : 'none';
  document.getElementById('tech-tipo-wrap').style.display = tech ? 'flex' : 'none';
  if (bug)  loadTiposProyecto('BG', 'bg-tipo', 'Error');
  if (tech) loadTiposProyecto('SP', 'tech-tipo', 'Tech Task');
  if (bug || tech) loadBgVersions();
  saveTextState();
}

// ── Modo texto / pasos ────────────────────────────────────────────────────────
function setModo(modo) {
  modoActual = modo;
  document.getElementById('desc-texto').style.display = modo === 'texto' ? '' : 'none';
  document.getElementById('desc-pasos').style.display = modo === 'pasos' ? '' : 'none';
  document.getElementById('btn-modo-texto').classList.toggle('active', modo === 'texto');
  document.getElementById('btn-modo-pasos').classList.toggle('active', modo === 'pasos');
  saveTextState();
}

function addPaso() {
  const wrap = document.getElementById('pasos-wrap');
  const n = wrap.querySelectorAll('.step-row').length + 1;
  const d = document.createElement('div'); d.className = 'step-row';
  d.innerHTML = `<div class="step-num">${n}</div><input type="text" class="inp" placeholder="Paso ${n}..."><button class="btn-rm" onclick="removePaso(this)">×</button>`;
  wrap.appendChild(d);
  d.querySelector('input').focus();
  saveTextState();
}

function removePaso(btn) {
  const wrap = document.getElementById('pasos-wrap');
  if (wrap.querySelectorAll('.step-row').length <= 1) return;
  btn.closest('.step-row').remove();
  wrap.querySelectorAll('.step-row').forEach((r, i) => {
    r.querySelector('.step-num').textContent = i + 1;
    r.querySelector('input').placeholder = `Paso ${i + 1}...`;
  });
  saveTextState();
}

// ── Descripción ADF ───────────────────────────────────────────────────────────
function buildDescription() {
  if (modoActual === 'texto') {
    const texto = document.getElementById('texto-desc').value.trim();
    if (!texto) return null;
    return { type:'doc', version:1, content:[ mkP(texto) ] };
  } else {
    const pasos = Array.from(document.querySelectorAll('#pasos-wrap .step-row input'))
      .map(i => i.value.trim()).filter(Boolean);
    if (!pasos.length) return null;
    return { type:'doc', version:1, content:[ mkOrderedList(pasos) ] };
  }
}

// ── Adjuntos ──────────────────────────────────────────────────────────────────
function onFilePicked(input) {
  Array.from(input.files).forEach(f => uploadedFiles.push(f));
  input.value = '';
  renderPreviews();
}

function removeFile(i) {
  uploadedFiles.splice(i, 1);
  renderPreviews();
}

function renderPreviews(skipSave) {
  const empty  = document.getElementById('upload-empty');
  const filled = document.getElementById('upload-filled');
  const wrap   = document.getElementById('previews-wrap');
  if (!uploadedFiles.length) { empty.style.display = ''; filled.style.display = 'none'; return; }
  empty.style.display = 'none'; filled.style.display = '';
  if (!skipSave) _saveFiles(uploadedFiles).catch(() => {});
  wrap.innerHTML = uploadedFiles.map((f, i) => {
    const isImg = f.type.startsWith('image/');
    const isVid = f.type.startsWith('video/');
    const preview = isImg
      ? `<img src="${URL.createObjectURL(f)}" style="width:100%;height:100%;object-fit:cover;border-radius:8px">`
      : isVid
      ? `<video src="${URL.createObjectURL(f)}" controls muted playsinline preload="metadata" style="width:100%;height:100%;object-fit:cover;border-radius:8px"></video>`
      : `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:4px;padding:8px">
           <svg width="20" height="20" fill="none" stroke="var(--g4)" stroke-width="1.5" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
           <span style="font-size:10px;color:var(--g4);text-align:center;word-break:break-all;max-width:90px">${f.name}</span>
         </div>`;
    return `<div class="preview-item" style="position:relative">
      ${preview}
      <button onclick="removeFile(${i})" class="preview-rm" style="position:absolute;top:4px;right:4px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,.55);border:none;color:#fff;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1">×</button>
    </div>`;
  }).join('');
}

document.addEventListener('paste', e => {
  const items = Array.from(e.clipboardData?.items || []);
  const files = items.filter(i => i.kind === 'file').map(i => i.getAsFile()).filter(Boolean);
  if (!files.length) return;
  files.forEach(f => uploadedFiles.push(f));
  renderPreviews();
});

document.getElementById('titulo').addEventListener('input', saveTextState);
document.getElementById('tipo-actividad').addEventListener('change', saveTextState);
document.getElementById('texto-desc').addEventListener('input', saveTextState);
document.getElementById('pasos-wrap').addEventListener('input', saveTextState);
document.getElementById('registrarEnQAAFinalizada').addEventListener('change', saveTextState);

// Cargar versión activa en background para que esté lista cuando el usuario abra el panel BG
inicializarSistemaVersiones().catch(() => {});

restoreState();

// ── Submit ────────────────────────────────────────────────────────────────────
async function submitActividad() {
  const titulo = document.getElementById('titulo').value.trim();
  if (!titulo) { document.getElementById('titulo').focus(); return; }

  const btn = document.getElementById('btn-submit');
  btn.disabled = true;

  // Issues creados — usados para rollback si algo falla
  let qaaKey  = null;
  let bgKey   = null;
  let techKey = null;

  async function rollback() {
    if (!qaaKey && !bgKey && !techKey) return;
    btn.textContent = 'Revirtiendo…';
    await Promise.allSettled([
      qaaKey  ? fetch(`${JIRA_BASE}/rest/api/3/issue/${qaaKey}`,  { method: 'DELETE' }) : null,
      bgKey   ? fetch(`${JIRA_BASE}/rest/api/3/issue/${bgKey}`,   { method: 'DELETE' }) : null,
      techKey ? fetch(`${JIRA_BASE}/rest/api/3/issue/${techKey}`, { method: 'DELETE' }) : null,
    ].filter(Boolean));
  }

  try {
    const description = buildDescription();
    const pasos = modoActual === 'pasos'
      ? Array.from(document.querySelectorAll('#pasos-wrap .step-row input')).map(i => i.value.trim()).filter(Boolean)
      : [];

    // ── 1. Crear issue QAA ──
    btn.textContent = 'Creando en QAA…';
    const r = await fetch(`${JIRA_BASE}/rest/api/3/issue`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({ fields: {
        project:           { key: 'QAA' },
        parent:            { key: EPIC_KEY },
        customfield_10014: EPIC_KEY,
        summary:           titulo,
        issuetype:         { name: document.getElementById('tipo-actividad').value || 'Tarea' },
        ...(window.versionActual ? { fixVersions: [{ name: window.versionActual }] } : {}),
        ...(description ? { description } : {}),
      }}),
    });
    if (!r.ok) {
      const e = await r.json();
      throw new Error(e.errors ? Object.values(e.errors).join(', ') : JSON.stringify(e));
    }
    const created  = await r.json();
    qaaKey = created.key;
    const issueUrl = `https://${JIRA_HOST}/browse/${qaaKey}`;

    // ── 2. Adjuntos a QAA ──
    for (const file of uploadedFiles) {
      btn.textContent = `Subiendo ${file.name}…`;
      const fd = new FormData(); fd.append('file', file);
      const ar = await fetch(`${JIRA_BASE}/rest/api/3/issue/${qaaKey}/attachments`, {
        method: 'POST', headers: { 'X-Atlassian-Token': 'no-check' }, body: fd,
      });
      if (!ar.ok) throw new Error(`Error subiendo "${file.name}" a ${qaaKey}`);
    }

    // ── 3. Reportes (BG / TECH) ──
    const reportarBug  = document.getElementById('reportar-bug')?.checked;
    const reportarTech = document.getElementById('reportar-tech')?.checked;

    if (reportarBug || reportarTech) {
      const textoDesc   = document.getElementById('texto-desc').value.trim();
      const versionRep  = document.getElementById('bg-version').value;
      const entornoRep  = document.getElementById('bg-entorno').value;
      const stepsRep    = modoActual === 'pasos'
        ? pasos
        : textoDesc ? textoDesc.split('\n').map(s => s.trim()).filter(Boolean) : [];

      // Datos compartidos por ambos reportes
      const reporteBase = {
        tcId:          qaaKey,
        desc:          titulo,
        moduloNombre:  EPIC_KEY,
        moduloLabel:   EPIC_KEY,
        versionActual: versionRep,
        severidad:     'severity-medio',
        sevLbl:        'Medio',
        entorno:       entornoRep,
        steps:         stepsRep,
        precon:        [],
        esperado:      [],
        obtenido:      [],
        impacto:       '',
        soluciones:    [],
        linkIssueKey:  qaaKey,
      };

      // Sube los adjuntos al issue indicado
      async function subirAdjuntos(issueKey, etiqueta) {
        for (const file of uploadedFiles) {
          btn.textContent = `Subiendo ${file.name} → ${etiqueta}…`;
          const fd = new FormData(); fd.append('file', file);
          const ar = await fetch(`${JIRA_BASE}/rest/api/3/issue/${issueKey}/attachments`, {
            method: 'POST', headers: { 'X-Atlassian-Token': 'no-check' }, body: fd,
          });
          if (!ar.ok) throw new Error(`Error subiendo "${file.name}" a ${issueKey}`);
        }
      }

      // ── BG ──
      if (reportarBug) {
        btn.textContent = 'Creando bug en BG…';
        const bg = await crearBugBG({ ...reporteBase, tipo: document.getElementById('bg-tipo').value || 'Error' });
        bgKey = bg.key;
        await subirAdjuntos(bgKey, 'BG');
      }

      // ── TECH (SP) ──
      if (reportarTech) {
        btn.textContent = 'Creando tarea en SP…';
        const tech = await crearTechSP({ ...reporteBase, tipo: document.getElementById('tech-tipo').value || 'Tech Task' });
        techKey = tech.key;
        await subirAdjuntos(techKey, 'SP');
      }
    }

    // ── 5. Transición a Finalizada ──
    if (document.getElementById('registrarEnQAAFinalizada')?.checked) {
      btn.textContent = 'Finalizando…';
      const tr = await fetch(`${JIRA_BASE}/rest/api/3/issue/${qaaKey}/transitions`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ transition: { id: '31' } }),
      });
      if (!tr.ok) throw new Error(`Error al finalizar ${qaaKey}`);
    }

    // ── Todo ok — mostrar resultado ──
    const msg = document.getElementById('result-msg');
    msg.innerHTML = `Actividad creada: <a href="${issueUrl}" target="_blank" style="color:#059669;font-weight:700">${qaaKey}</a>`
      + (bgKey   ? ` &nbsp;·&nbsp; Bug BG: <a href="https://${JIRA_HOST}/browse/${bgKey}" target="_blank" style="color:#dc2626;font-weight:700">${bgKey}</a>` : '')
      + (techKey ? ` &nbsp;·&nbsp; Tech SP: <a href="https://${JIRA_HOST}/browse/${techKey}" target="_blank" style="color:#2563eb;font-weight:700">${techKey}</a>` : '');
    document.getElementById('result-box').classList.add('show');
    document.getElementById('result-box').scrollIntoView({ behavior: 'smooth' });
    clearDraft();

  } catch(e) {
    await rollback();
    const eliminados = [qaaKey, bgKey, techKey].filter(Boolean);
    alert(
      `Error — no se creó nada.\n\n${e.message}`
      + (eliminados.length ? `\n\nSe eliminó: ${eliminados.join(', ')}` : '')
    );
  }

  btn.disabled = false;
  btn.textContent = 'Crear actividad';
}

function resetForm() {
  clearDraft();
  document.getElementById('titulo').value      = '';
  const tipoSel = document.getElementById('tipo-actividad');
  if (Array.from(tipoSel.options).some(o => o.value === 'Tarea')) tipoSel.value = 'Tarea';
  document.getElementById('texto-desc').value  = '';
  document.getElementById('pasos-wrap').innerHTML = `
    <div class="step-row">
      <div class="step-num">1</div>
      <input type="text" class="inp" placeholder="Paso 1...">
      <button class="btn-rm" onclick="removePaso(this)">×</button>
    </div>`;
  document.getElementById('reportar-bug').checked              = false;
  document.getElementById('reportar-tech').checked             = false;
  document.getElementById('registrarEnQAAFinalizada').checked  = false;
  document.getElementById('bg-assignee-wrap').style.display    = 'none';
  document.getElementById('bg-tipo-wrap').style.display        = 'none';
  document.getElementById('tech-tipo-wrap').style.display      = 'none';
  uploadedFiles = [];
  renderPreviews();
  setModo('texto');
  document.getElementById('result-box').classList.remove('show');
}
</script>
