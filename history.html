<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Historial QA — Hybred</title>
<link rel="stylesheet" href="/styles.css">
<style>
/* ── Filtros ── */
.filters {
  display: flex; gap: 10px; flex-wrap: wrap;
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  background: var(--g0);
}
.filter-group { display: flex; flex-direction: column; gap: 4px; min-width: 160px; flex: 1; }
.filter-label { font-size: 11px; font-weight: 600; color: var(--g5); text-transform: uppercase; letter-spacing: .5px; }
.filter-select, .filter-input {
  padding: 7px 10px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--white); color: var(--g8); font-size: 13px;
  outline: none; transition: border-color .15s;
}
.filter-select:focus, .filter-input:focus { border-color: var(--g6); }
.btn-filter {
  align-self: flex-end; padding: 7px 18px; border-radius: 8px;
  background: var(--g8); color: #fff; border: none; font-size: 13px;
  font-weight: 600; cursor: pointer; transition: opacity .15s; white-space: nowrap;
}
.btn-filter:hover { opacity: .85; }
.btn-clear {
  align-self: flex-end; padding: 7px 14px; border-radius: 8px;
  background: none; color: var(--g5); border: 1px solid var(--border);
  font-size: 13px; cursor: pointer; transition: background .15s; white-space: nowrap;
}
.btn-clear:hover { background: var(--g1); }

/* ── Stats ── */
.stats-bar {
  display: flex; gap: 16px; padding: 12px 20px;
  border-bottom: 1px solid var(--border); flex-wrap: wrap;
}
.stat-item { display: flex; flex-direction: column; gap: 2px; }
.stat-num  { font-size: 20px; font-weight: 700; color: var(--g8); line-height: 1; }
.stat-lbl  { font-size: 11px; color: var(--g5); }
.stat-pass { color: #16a34a; }
.stat-fail { color: #dc2626; }
.stat-block{ color: #d97706; }
.stat-sep  { width: 1px; background: var(--border); margin: 4px 0; }

/* ── Tabla ── */
.history-table th, .history-table td { white-space: nowrap; }
.history-table td.desc-cell { white-space: normal; max-width: 260px; }
.pill-pass    { background: #dcfce7; color: #15803d; }
.pill-fail    { background: #fee2e2; color: #991b1b; }
.pill-blocked { background: #fef3c7; color: #92400e; }
.pill-config  { background: #fff7ed; color: #c2410c; font-size: 10px; }

.jira-link {
  display: inline-flex; align-items: center; gap: 4px;
  color: #2563eb; font-weight: 600; font-size: 12px; text-decoration: none;
}
.jira-link:hover { text-decoration: underline; }

.badge-version-sm {
  display: inline-block; padding: 2px 8px; border-radius: 20px;
  font-size: 11px; font-weight: 600; background: #dcfce7; color: #15803d;
  white-space: nowrap;
}

.jira-status-pill {
  display:inline-block; padding:2px 10px; border-radius:20px; font-size:11px;
  font-weight:600; letter-spacing:.3px; white-space:nowrap;
  background:#f3f4f6; color:#6b7280;
}
.jira-status-pill.cat-done       { background:#dcfce7; color:#15803d; }
.jira-status-pill.cat-inprogress { background:#dbeafe; color:#1d4ed8; }
.jira-status-pill.cat-todo       { background:#f3f4f6; color:#6b7280; }

.btn-change {
  background:none; border:1px solid var(--border); border-radius:6px;
  color:var(--g5); font-size:11px; padding:2px 7px; cursor:pointer;
  transition:background .15s; flex-shrink:0;
}
.btn-change:hover  { background:var(--g1); }
.btn-change:disabled { opacity:.4; cursor:default; }
.jira-cell { display:flex; align-items:center; gap:6px; }

.popover {
  position:fixed; z-index:400;
  background:#1e2430; border:1px solid #374151; border-radius:10px;
  box-shadow:0 12px 32px rgba(0,0,0,.5);
  min-width:180px; padding:6px 0;
}
.popover-title {
  padding:6px 16px 4px; font-size:10px; font-weight:700;
  letter-spacing:.6px; text-transform:uppercase; color:#64748b;
}
.popover-item {
  padding:10px 16px; font-size:13px; font-weight:500;
  cursor:pointer; color:#f1f5f9; transition:background .1s;
  display:flex; align-items:center; gap:8px;
}
.popover-item::before { content:''; width:7px; height:7px; border-radius:50%; background:#4dbf94; flex-shrink:0; }
.popover-item:hover { background:#2d3748; }
.popover-item.dim { color:#94a3b8; cursor:default; }
.popover-item.dim::before { background:#475569; }

.pag-bar { display:flex; align-items:center; gap:8px; padding:12px 20px; }
.btn-pag {
  padding:5px 14px; border-radius:7px; border:1px solid var(--border);
  background:var(--white); color:var(--g7); font-size:12px; cursor:pointer;
  transition:background .15s;
}
.btn-pag:hover:not(:disabled) { background:var(--g1); }
.btn-pag:disabled { opacity:.4; cursor:default; }
.pag-info { font-size:12px; color:var(--g5); }
</style>
</head>
<body>
<div class="page">

<!-- ── Header ── -->
<div class="hdr">
  <div class="hdr-icon">
    <svg fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
      <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
    </svg>
  </div>
  <div class="hdr-text">
    <h1>Historial de pruebas</h1>
    <p>Hybred · Proyecto QAA · Datos en tiempo real desde Jira</p>
  </div>
  <div class="hdr-right">
    <div class="hdr-badges">
      <span class="badge">ISO 29119</span>
      <span class="badge">ISTQB</span>
    </div>
    <a href="/" class="btn-hdr-history">
      <svg fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
      </svg>
      <span>Nuevo TC</span>
    </a>
  </div>
</div>

<!-- ── Card ── -->
<div class="card" style="padding:0; overflow:visible">

  <!-- Filtros -->
  <div class="filters">
    <div class="filter-group">
      <span class="filter-label">Versión</span>
      <select class="filter-select" id="f-version">
        <option value="">Todas</option>
      </select>
    </div>
    <div class="filter-group">
      <span class="filter-label">Módulo (Epic)</span>
      <select class="filter-select" id="f-epic">
        <option value="">Todos</option>
      </select>
    </div>
    <div class="filter-group">
      <span class="filter-label">Estado</span>
      <select class="filter-select" id="f-estado">
        <option value="">Todos</option>
        <option value="estado-pass">Pass</option>
        <option value="estado-fail">Fail</option>
        <option value="estado-blocked">Bloqueado</option>
      </select>
    </div>
    <div class="filter-group">
      <span class="filter-label">Desde</span>
      <input type="date" class="filter-input" id="f-desde">
    </div>
    <div class="filter-group">
      <span class="filter-label">Hasta</span>
      <input type="date" class="filter-input" id="f-hasta">
    </div>
    <button class="btn-filter" onclick="applyFilters()">Buscar</button>
    <button class="btn-clear"  onclick="clearFilters()">Limpiar</button>
  </div>

  <!-- Stats -->
  <div class="stats-bar" id="stats-bar">
    <div class="stat-item"><span class="stat-num" id="s-total">—</span><span class="stat-lbl">Total</span></div>
    <div class="stat-sep"></div>
    <div class="stat-item"><span class="stat-num stat-pass" id="s-pass">—</span><span class="stat-lbl">Pass</span></div>
    <div class="stat-item"><span class="stat-num stat-fail" id="s-fail">—</span><span class="stat-lbl">Fail</span></div>
    <div class="stat-item"><span class="stat-num stat-block" id="s-block">—</span><span class="stat-lbl">Bloqueado</span></div>
    <div class="stat-sep"></div>
    <div class="stat-item"><span class="stat-num" id="s-config">—</span><span class="stat-lbl">⚙️ Config</span></div>
  </div>

  <!-- Tabla -->
  <div style="overflow-x:auto">
    <table class="history-table">
      <thead>
        <tr>
          <th>Issue</th>
          <th>Descripción</th>
          <th>Módulo</th>
          <th>Estado QA</th>
          <th>Estado Jira</th>
          <th>Versión</th>
          <th>⚙️</th>
          <th>Creado</th>
        </tr>
      </thead>
      <tbody id="history-body">
        <tr><td colspan="8"><div class="empty-state">Cargando...</div></td></tr>
      </tbody>
    </table>
  </div>

  <!-- Paginación -->
  <div class="pag-bar">
    <button class="btn-pag" id="btn-prev" onclick="changePage(-1)" disabled>← Anterior</button>
    <span class="pag-info" id="pag-info"></span>
    <button class="btn-pag" id="btn-next" onclick="changePage(1)" disabled>Siguiente →</button>
  </div>

</div>
</div>

<div id="popover" class="popover" style="display:none"></div>

<script>
const JIRA_BASE = window.location.origin + '/jira';
const PAGE_SIZE = 50;
let currentPage = 0;
let totalIssues = 0;
let currentJQL  = '';

// ── Cargar filtros ────────────────────────────────────────────────────────────
async function cargarFiltros() {
  const [versiones, epics] = await Promise.all([
    fetch(`${JIRA_BASE}/rest/api/3/project/QAA/versions`, { headers:{ 'Accept':'application/json' } }).then(r => r.json()).catch(() => []),
    fetch(`${JIRA_BASE}/rest/api/3/search/jql?jql=${encodeURIComponent('project = QAA AND issuetype = Epic ORDER BY created ASC')}&fields=summary&maxResults=100`, { headers:{ 'Accept':'application/json' } }).then(r => r.json()).catch(() => ({}))
  ]);

  const selV = document.getElementById('f-version');
  [...versiones].reverse().forEach(v => {
    const opt = document.createElement('option');
    opt.value = v.name;
    opt.textContent = v.name + (v.released ? ' ✓' : ' (activa)');
    selV.appendChild(opt);
  });

  const selE = document.getElementById('f-epic');
  (epics.issues || []).forEach(e => {
    const opt = document.createElement('option');
    opt.value = e.key;
    opt.textContent = e.fields.summary;
    selE.appendChild(opt);
  });
}

// ── Construir JQL ─────────────────────────────────────────────────────────────
function buildJQL() {
  const parts = ['project = QAA', 'issuetype != Epic'];
  const ver    = document.getElementById('f-version').value;
  const epic   = document.getElementById('f-epic').value;
  const estado = document.getElementById('f-estado').value;
  const desde  = document.getElementById('f-desde').value;
  const hasta  = document.getElementById('f-hasta').value;

  if (ver)    parts.push(`fixVersion = "${ver}"`);
  if (epic)   parts.push(`parent = "${epic}"`);
  if (estado) parts.push(`labels = "${estado}"`);
  if (desde)  parts.push(`created >= "${desde}"`);
  if (hasta)  parts.push(`created <= "${hasta}"`);

  return parts.join(' AND ') + ' ORDER BY created DESC';
}

// ── Stats — se calculan desde los issues cargados ────────────────────────────
function calcularStats(issues) {
  let pass = 0, fail = 0, blocked = 0, config = 0;
  issues.forEach(issue => {
    const labels = issue.fields.labels || [];
    if (labels.includes('estado-pass'))    pass++;
    if (labels.includes('estado-fail'))    fail++;
    if (labels.includes('estado-blocked')) blocked++;
    if (labels.includes('requiere-config'))config++;
  });
  document.getElementById('s-total').textContent  = issues.length;
  document.getElementById('s-pass').textContent   = pass;
  document.getElementById('s-fail').textContent   = fail;
  document.getElementById('s-block').textContent  = blocked;
  document.getElementById('s-config').textContent = config;
}

// ── Cargar página ─────────────────────────────────────────────────────────────
async function loadPage(jql, page) {
  const wrap = document.getElementById('history-body');
  wrap.innerHTML = `<tr><td colspan="8"><div class="empty-state">Cargando...</div></td></tr>`;

  const start = page * PAGE_SIZE;
  const url = `${JIRA_BASE}/rest/api/3/search/jql?jql=${encodeURIComponent(jql)}&fields=summary,labels,status,fixVersions,parent,created,priority&maxResults=${PAGE_SIZE}&startAt=${start}`;

  try {
    const r = await fetch(url, { headers:{ 'Accept':'application/json' } });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    const issues = data.issues || [];
    const isLast = data.isLast ?? (issues.length < PAGE_SIZE);

    if (page === 0) calcularStats(issues);

    document.getElementById('pag-info').textContent =
      issues.length ? `Página ${page + 1} · ${issues.length} resultados` : '';
    document.getElementById('btn-prev').disabled = page === 0;
    document.getElementById('btn-next').disabled = isLast;

    if (!issues.length) {
      wrap.innerHTML = `<tr><td colspan="8"><div class="empty-state">No hay resultados para estos filtros.</div></td></tr>`;
      return;
    }

    wrap.innerHTML = issues.map(issue => {
      const fields   = issue.fields;
      const labels   = fields.labels || [];
      const estadoLbl = labels.find(l => l.startsWith('estado-'));
      const esConfig  = labels.includes('requiere-config');
      const version   = (fields.fixVersions || [])[0]?.name || '—';
      const modulo    = fields.parent?.fields?.summary || fields.parent?.key || '—';
      const fecha     = fields.created ? fields.created.split('T')[0] : '—';
      const status    = fields.status;
      const statusCat = (status?.statusCategory?.name || '').toLowerCase();
      const statusCls = statusCat.includes('done') || statusCat.includes('complet') ? 'cat-done'
                      : statusCat.includes('progress') || statusCat.includes('review') ? 'cat-inprogress'
                      : 'cat-todo';

      let estadoPill = '—';
      if (estadoLbl) {
        const e = estadoLbl.replace('estado-', '');
        const cls = e === 'pass' ? 'pill-pass' : e === 'fail' ? 'pill-fail' : 'pill-blocked';
        const lbl = e === 'pass' ? 'Pass' : e === 'fail' ? 'Fail' : 'Bloqueado';
        estadoPill = `<span class="pill ${cls}">${lbl}</span>`;
      }

      const jiraUrl = `https://liceopinoverde.atlassian.net/browse/${issue.key}`;

      return `<tr>
        <td><a class="jira-link" href="${jiraUrl}" target="_blank">↗ ${issue.key}</a></td>
        <td class="desc-cell">${fields.summary || '—'}</td>
        <td style="font-size:12px;color:var(--g5)">${modulo}</td>
        <td>${estadoPill}</td>
        <td>
          <div class="jira-cell">
            <span class="jira-status-pill ${statusCls}" id="sp-${issue.key}">${status?.name || '—'}</span>
            <button class="btn-change" id="btn-s-${issue.key}" onclick="openStatusPicker(event,'${issue.key}')">↕</button>
          </div>
        </td>
        <td>${version !== '—' ? `<span class="badge-version-sm">${version}</span>` : '—'}</td>
        <td style="text-align:center">${esConfig ? '⚙️' : ''}</td>
        <td class="date-cell">${fecha}</td>
      </tr>`;
    }).join('');

  } catch(e) {
    wrap.innerHTML = `<tr><td colspan="8"><div class="empty-state" style="color:#b91c1c">Error: ${e.message}</div></td></tr>`;
  }
}

// ── Filtros ───────────────────────────────────────────────────────────────────
function applyFilters() {
  currentPage = 0;
  currentJQL  = buildJQL();
  loadPage(currentJQL, currentPage);
}

function clearFilters() {
  ['f-version','f-epic','f-estado'].forEach(id => document.getElementById(id).value = '');
  ['f-desde','f-hasta'].forEach(id => document.getElementById(id).value = '');
  applyFilters();
}

function changePage(dir) {
  currentPage += dir;
  loadPage(currentJQL, currentPage);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Status picker ─────────────────────────────────────────────────────────────
let activePopover = null;

function showPopover(btn, title, items) {
  const pop = document.getElementById('popover');
  pop.innerHTML = `<div class="popover-title">${title}</div>` +
    items.map(i => `<div class="popover-item ${i.dim ? 'dim' : ''}" ${i.onclick ? `onclick="${i.onclick}"` : ''}>${i.label}</div>`).join('');
  const rect = btn.getBoundingClientRect();
  pop.style.display = 'block';
  const popH = pop.offsetHeight || 200;
  const spaceBelow = window.innerHeight - rect.bottom;
  pop.style.top  = `${spaceBelow >= popH + 8 ? rect.bottom + window.scrollY + 4 : rect.top + window.scrollY - popH - 4}px`;
  pop.style.left = `${Math.min(rect.left + window.scrollX, window.innerWidth - 200)}px`;
}

function closePopover() {
  document.getElementById('popover').style.display = 'none';
  activePopover = null;
}

document.addEventListener('click', e => {
  if (!e.target.closest('#popover') && !e.target.closest('.btn-change')) closePopover();
});

async function openStatusPicker(event, key) {
  event.stopPropagation();
  const btn = document.getElementById(`btn-s-${key}`);
  if (activePopover?.key === key) { closePopover(); return; }
  activePopover = { key };
  showPopover(btn, 'Cambiar estado', [{ label: 'Cargando...', dim: true }]);
  btn.disabled = true;
  try {
    const r = await fetch(`${JIRA_BASE}/rest/api/3/issue/${key}/transitions`, { headers:{ 'Accept':'application/json' } });
    const data = await r.json();
    const transitions = data.transitions || [];
    showPopover(btn, 'Cambiar estado', transitions.length
      ? transitions.map(t => ({ label: t.name, onclick: `applyTransition('${key}','${t.id}')` }))
      : [{ label: 'Sin transiciones disponibles', dim: true }]);
  } catch(e) {
    showPopover(btn, 'Cambiar estado', [{ label: `Error: ${e.message}`, dim: true }]);
  }
  btn.disabled = false;
}

async function applyTransition(key, transitionId) {
  closePopover();
  const btn  = document.getElementById(`btn-s-${key}`);
  const pill = document.getElementById(`sp-${key}`);
  if (btn)  btn.disabled = true;
  if (pill) pill.textContent = '...';
  try {
    const r = await fetch(`${JIRA_BASE}/rest/api/3/issue/${key}/transitions`, {
      method: 'POST',
      headers:{ 'Content-Type':'application/json', 'Accept':'application/json' },
      body: JSON.stringify({ transition: { id: transitionId } })
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const info = await fetch(`${JIRA_BASE}/rest/api/3/issue/${key}?fields=status`, { headers:{ 'Accept':'application/json' } }).then(r => r.json());
    const s   = info.fields.status;
    const cat = (s?.statusCategory?.name || '').toLowerCase();
    const cls = cat.includes('done') || cat.includes('complet') ? 'cat-done'
              : cat.includes('progress') ? 'cat-inprogress' : 'cat-todo';
    if (pill) { pill.textContent = s?.name || ''; pill.className = `jira-status-pill ${cls}`; }
  } catch(e) {
    if (pill) pill.textContent = 'Error';
  }
  if (btn) btn.disabled = false;
}

// ── Init ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  await cargarFiltros();
  currentJQL = buildJQL();
  loadPage(currentJQL, 0);
});
</script>
</body>
</html>
