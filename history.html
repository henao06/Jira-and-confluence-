<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Historial QA — Hybred</title>
<link rel="stylesheet" href="/styles.css">
<style>
.jira-cell { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }

.jira-status-pill {
  display:inline-block; padding:2px 10px; border-radius:20px; font-size:11px;
  font-weight:600; letter-spacing:.3px; white-space:nowrap;
  background:#f3f4f6; color:#6b7280;
}
.jira-status-pill.cat-done       { background:#dcfce7; color:#15803d; }
.jira-status-pill.cat-inprogress { background:#dbeafe; color:#1d4ed8; }
.jira-status-pill.cat-todo       { background:#f3f4f6; color:#6b7280; }

.jira-type-pill {
  display:inline-block; padding:2px 10px; border-radius:20px; font-size:11px;
  font-weight:600; letter-spacing:.3px; white-space:nowrap;
  background:#fef3c7; color:#92400e;
}

.btn-change {
  background:none; border:1px solid var(--bdr); border-radius:6px;
  color:var(--txt2); font-size:11px; padding:2px 7px; cursor:pointer;
  white-space:nowrap; transition:background .15s, border-color .15s; flex-shrink:0;
}
.btn-change:hover  { background:var(--sur2); border-color:var(--g7); color:var(--g7); }
.btn-change:disabled { opacity:.4; cursor:default; }

.popover {
  position:fixed; z-index:400;
  background:#1e2430; border:1px solid #374151; border-radius:10px;
  box-shadow:0 12px 32px rgba(0,0,0,.5);
  min-width:200px; padding:6px 0;
}
.popover-title {
  padding:6px 16px 4px; font-size:10px; font-weight:700;
  letter-spacing:.6px; text-transform:uppercase; color:#64748b;
}
.popover-item {
  padding:10px 16px; font-size:13px; font-weight:500;
  cursor:pointer; color:#f1f5f9;
  transition:background .1s;
  display:flex; align-items:center; gap:8px;
}
.popover-item::before {
  content:''; width:7px; height:7px; border-radius:50%;
  background:#4dbf94; flex-shrink:0;
}
.popover-item:hover { background:#2d3748; }
.popover-item.dim { color:#94a3b8; cursor:default; }
.popover-item.dim::before { background:#475569; }

.cell-loading { font-size:11px; color:var(--txt3); }
</style>
</head>
<body>
<div class="page">

<!-- ── Header ── -->
<div class="hdr">
  <div class="hdr-icon">
    <svg fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
      <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
    </svg>
  </div>
  <div class="hdr-text">
    <h1>Historial de pruebas</h1>
    <p>Hybred · Proyecto BUGS · ISO/IEC 29119 · ISTQB</p>
  </div>
  <div class="hdr-right">
    <div class="hdr-badges">
      <span class="badge">ISO 29119</span>
      <span class="badge">ISTQB</span>
    </div>
    <a href="/" class="btn-hdr-history">
      <svg fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
      </svg>
      <span>Nuevo TC</span>
    </a>
  </div>
</div>

<!-- ── Historial ── -->
<div class="card">
  <div class="history-hdr">
    <div class="history-title">
      <svg fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
      </svg>
      Casos enviados
    </div>
    <span class="history-count" id="history-count"></span>
  </div>
  <div style="overflow-x:auto">
    <table class="history-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Descripción</th>
          <th>Módulo</th>
          <th>Estado QA</th>
          <th>Estado Jira</th>
          <th>Tipo</th>
          <th>Fecha</th>
          <th>Issue Jira</th>
        </tr>
      </thead>
      <tbody id="history-body">
        <tr><td colspan="8"><div class="empty-state">Cargando...</div></td></tr>
      </tbody>
    </table>
  </div>
</div>

</div><!-- /page -->

<div id="popover" class="popover" style="display:none"></div>

<script>
const JIRA_BASE = window.location.origin + '/jira';
const AUTH = '';

// ── Caches ────────────────────────────────────────────────────────────────
const statusCache = {};   // key → { name, category }
const typeCache   = {};   // key → typeName
let   availableTypes = null;  // array de nombres, se carga una sola vez

// ── Helpers ───────────────────────────────────────────────────────────────
function statusPillClass(cat) {
  const c = (cat || '').toLowerCase();
  if (c.includes('done') || c.includes('complete')) return 'cat-done';
  if (c.includes('progress') || c.includes('review')) return 'cat-inprogress';
  return 'cat-todo';
}

// ── Batch fetch: estado + tipo ────────────────────────────────────────────
async function fetchJiraData(keys) {
  if (!keys.length) return;
  const jql = encodeURIComponent(`issueKey in (${keys.join(',')})`);
  try {
    const r = await fetch(
      `${JIRA_BASE}/rest/api/3/search/jql?jql=${jql}&fields=status,issuetype&maxResults=100`,
      { headers: { 'Accept': 'application/json' } }
    );
    if (!r.ok) return;
    const data = await r.json();
    (data.issues || []).forEach(issue => {
      const s = issue.fields.status;
      const t = issue.fields.issuetype;
      statusCache[issue.key] = { name: s.name, category: s.statusCategory?.name || '' };
      typeCache[issue.key]   = t?.name || '—';
    });
  } catch {}
}

// ── Fetch tipos disponibles del proyecto (una sola vez) ───────────────────
async function fetchAvailableTypes() {
  if (availableTypes) return availableTypes;
  try {
    const r = await fetch(
      `${JIRA_BASE}/rest/api/3/issue/createmeta?projectKeys=BUGS&expand=projects.issuetypes`,
      { headers: { 'Accept': 'application/json' } }
    );
    if (!r.ok) throw new Error();
    const data = await r.json();
    const proj = (data.projects || [])[0];
    availableTypes = (proj?.issuetypes || []).map(t => t.name).filter(Boolean);
  } catch {
    availableTypes = ['Error', 'Tarea', 'Historia', 'Épica'];
  }
  return availableTypes;
}

// ── Render celdas ─────────────────────────────────────────────────────────
function renderStatusCell(key) {
  const s = statusCache[key];
  if (!s) return `<span class="cell-loading">—</span>`;
  const cls = statusPillClass(s.category);
  return `
    <div class="jira-cell">
      <span class="jira-status-pill ${cls}" id="sp-${key}">${s.name}</span>
      <button class="btn-change" id="btn-s-${key}" onclick="openStatusPicker(event,'${key}')">Cambiar</button>
    </div>`;
}

function renderTypeCell(key) {
  const t = typeCache[key];
  if (!t) return `<span class="cell-loading">—</span>`;
  return `
    <div class="jira-cell">
      <span class="jira-type-pill" id="tp-${key}">${t}</span>
      <button class="btn-change" id="btn-t-${key}" onclick="openTypePicker(event,'${key}')">Cambiar</button>
    </div>`;
}

// ── Historial ─────────────────────────────────────────────────────────────
async function loadHistory() {
  const wrap    = document.getElementById('history-body');
  const countEl = document.getElementById('history-count');
  try {
    const rows = await fetch('/api/history').then(r => r.json());
    if (!rows.length) {
      wrap.innerHTML = '<tr><td colspan="8"><div class="empty-state">Todavía no hay casos enviados.</div></td></tr>';
      return;
    }
    countEl.textContent = `${rows.length} registro${rows.length > 1 ? 's' : ''}`;

    const pillClass = { 'Pass':'pill-pass', 'Fail':'pill-fail', 'Bloqueado':'pill-blocked' };
    const keys = [...new Set(rows.map(r => r.jira_key).filter(Boolean))];

    wrap.innerHTML = rows.map(r => `
      <tr>
        <td class="tc-mono">${r.tc_id || '—'}</td>
        <td class="desc-cell">${r.descripcion || '—'}</td>
        <td>${r.modulo || '—'}</td>
        <td><span class="pill ${pillClass[r.estado] || ''}">${r.estado || '—'}</span></td>
        <td id="sc-${r.jira_key}"><span class="cell-loading">Cargando...</span></td>
        <td id="tc-${r.jira_key}"><span class="cell-loading">Cargando...</span></td>
        <td class="date-cell">${r.fecha || '—'}</td>
        <td><a href="${r.jira_url}" target="_blank">${r.jira_key || '—'}</a></td>
      </tr>`).join('');

    await fetchJiraData(keys);

    rows.forEach(r => {
      if (!r.jira_key) return;
      const sc = document.getElementById(`sc-${r.jira_key}`);
      const tc = document.getElementById(`tc-${r.jira_key}`);
      if (sc) sc.innerHTML = renderStatusCell(r.jira_key);
      if (tc) tc.innerHTML = renderTypeCell(r.jira_key);
    });

  } catch {
    wrap.innerHTML = '<tr><td colspan="8"><div class="empty-state" style="color:#b91c1c">Error cargando historial.</div></td></tr>';
  }
}

// ── Popover genérico ──────────────────────────────────────────────────────
let activePopover = null; // { key, mode }

function showPopover(anchorBtn, titleText, items) {
  const pop = document.getElementById('popover');
  pop.innerHTML = `<div class="popover-title">${titleText}</div>` +
    items.map(item => `<div class="popover-item ${item.dim ? 'dim' : ''}" ${item.onclick ? `onclick="${item.onclick}"` : ''}>
      ${item.label}
    </div>`).join('');

  const rect = anchorBtn.getBoundingClientRect();
  pop.style.display = 'block';

  // Posicionar: calcular si hay espacio abajo o arriba
  const popH = pop.offsetHeight || 200;
  const spaceBelow = window.innerHeight - rect.bottom;
  if (spaceBelow >= popH + 8 || spaceBelow >= 120) {
    pop.style.top  = `${rect.bottom + window.scrollY + 4}px`;
  } else {
    pop.style.top  = `${rect.top + window.scrollY - popH - 4}px`;
  }
  pop.style.left = `${Math.min(rect.left + window.scrollX, window.innerWidth - 220)}px`;
}

function closePopover() {
  document.getElementById('popover').style.display = 'none';
  activePopover = null;
}

document.addEventListener('click', e => {
  if (!e.target.closest('#popover') && !e.target.closest('.btn-change')) closePopover();
});

// ── Status picker ─────────────────────────────────────────────────────────
async function openStatusPicker(event, key) {
  event.stopPropagation();
  const btn = document.getElementById(`btn-s-${key}`);

  if (activePopover?.key === key && activePopover?.mode === 'status') { closePopover(); return; }
  activePopover = { key, mode: 'status' };

  showPopover(btn, 'Cambiar estado', [{ label: 'Cargando...', dim: true }]);
  btn.disabled = true;

  try {
    const r = await fetch(`${JIRA_BASE}/rest/api/3/issue/${key}/transitions`, {
      headers: { 'Accept': 'application/json' }
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    const transitions = data.transitions || [];

    if (!transitions.length) {
      showPopover(btn, 'Cambiar estado', [{ label: 'Sin transiciones disponibles', dim: true }]);
    } else {
      showPopover(btn, 'Cambiar estado', transitions.map(t => ({
        label: t.name,
        onclick: `applyTransition('${key}','${t.id}')`
      })));
    }
  } catch(e) {
    showPopover(btn, 'Cambiar estado', [{ label: `Error: ${e.message}`, dim: true }]);
  }
  btn.disabled = false;
}

async function applyTransition(key, transitionId) {
  closePopover();
  const btn  = document.getElementById(`btn-s-${key}`);
  const pill = document.getElementById(`sp-${key}`);
  if (btn)  btn.disabled = true;
  if (pill) pill.textContent = 'Aplicando...';

  try {
    const r = await fetch(`${JIRA_BASE}/rest/api/3/issue/${key}/transitions`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({ transition: { id: transitionId } })
    });
    if (!r.ok) throw new Error((await r.json().catch(() => ({}))).errorMessages?.join(', ') || `HTTP ${r.status}`);

    await fetchJiraData([key]);
    const cell = document.getElementById(`sc-${key}`);
    if (cell) cell.innerHTML = renderStatusCell(key);
  } catch(e) {
    console.error('[applyTransition]', e.message);
    if (pill) pill.textContent = 'Error';
    if (btn)  btn.disabled = false;
  }
}

// ── Type picker ───────────────────────────────────────────────────────────
async function openTypePicker(event, key) {
  event.stopPropagation();
  const btn = document.getElementById(`btn-t-${key}`);

  if (activePopover?.key === key && activePopover?.mode === 'type') { closePopover(); return; }
  activePopover = { key, mode: 'type' };

  showPopover(btn, 'Cambiar tipo', [{ label: 'Cargando...', dim: true }]);
  btn.disabled = true;

  const types = await fetchAvailableTypes();
  const current = typeCache[key] || '';

  showPopover(btn, 'Cambiar tipo', types.map(name => ({
    label: name === current ? `${name} ✓` : name,
    onclick: name !== current ? `applyTypeChange('${key}','${name.replace(/'/g,"\\'")}')` : '',
    dim: name === current
  })));

  btn.disabled = false;
}

async function applyTypeChange(key, typeName) {
  closePopover();
  const btn  = document.getElementById(`btn-t-${key}`);
  const pill = document.getElementById(`tp-${key}`);
  if (btn)  btn.disabled = true;
  if (pill) pill.textContent = 'Actualizando...';

  try {
    const r = await fetch(`${JIRA_BASE}/rest/api/3/issue/${key}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({ fields: { issuetype: { name: typeName } } })
    });
    if (!r.ok) throw new Error((await r.json().catch(() => ({}))).errorMessages?.join(', ') || `HTTP ${r.status}`);

    typeCache[key] = typeName;
    const cell = document.getElementById(`tc-${key}`);
    if (cell) cell.innerHTML = renderTypeCell(key);
  } catch(e) {
    console.error('[applyTypeChange]', e.message);
    if (pill) pill.textContent = 'Error';
    if (btn)  btn.disabled = false;
  }
}

document.addEventListener('DOMContentLoaded', loadHistory);
</script>
</body>
</html>
