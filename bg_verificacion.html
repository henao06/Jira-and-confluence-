// ── ADF builders ──────────────────────────────────────────────────────────────

function mkH(text, level=2)   { return { type:'heading', attrs:{level}, content:[{type:'text',text}] }; }
function mkP(text)             { return { type:'paragraph', content:[{type:'text',text:text||'—'}] }; }
function mkB(text)             { return { type:'paragraph', content:[{type:'text',text,marks:[{type:'strong'}]}] }; }
function mkRule()              { return { type:'rule' }; }
// Nodo de texto con la key del issue como link clickeable a Jira
function mkIssueLink(key) {
  return { type:'text', text:String(key), marks:[{ type:'link', attrs:{ href:`${APP_CONFIG.jira.browseUrl}${key}` } }] };
}
// Párrafo "label KEY" donde KEY es un link clickeable
function mkIssueRef(label, key) {
  return { type:'paragraph', content:[
    { type:'text', text:label, marks:[{type:'strong'}] },
    mkIssueLink(key),
  ]};
}
function mkPanel(panelType, content) { return { type:'panel', attrs:{panelType}, content }; }
function mkOrderedList(items) {
  return { type:'orderedList', content: items.map(i => ({
    type:'listItem', content:[{type:'paragraph', content:[{type:'text',text:i}]}]
  }))};
}
function mkBulletList(items) {
  return { type:'bulletList', content: items.map(i => ({
    type:'listItem', content:[{type:'paragraph', content:[{type:'text',text:i}]}]
  }))};
}
function mkTableCell(text, isHeader=false) {
  return { type:isHeader?'tableHeader':'tableCell', attrs:{}, content:[{type:'paragraph',content:[{type:'text',text:String(text||'—')}]}] };
}
function mkTableRow(label, value) {
  return { type:'tableRow', content:[mkTableCell(label,true), mkTableCell(String(value||'—'))] };
}
function mkTable(rows) {
  return { type:'table', attrs:{isNumberColumnEnabled:false, layout:'default'}, content:rows };
}

function buildDescription(issue) {
  const f          = issue.fields;
  const priority   = f.priority?.name || 'Medium';
  const reporter   = f.reporter?.displayName || '—';
  const assignee   = f.assignee?.displayName || 'Sin asignar';
  const created    = formatDate(f.created);
  const labels     = (f.labels || []).join(', ') || '—';
  const descText   = extraerTextoADF(f.description) || 'Sin descripción';
  const item       = colaItems[issue.key];
  const resultados = item?.resultadosObtenidos?.trim() || 'Sin resultados registrados.';
  const resultado  = item?.resultadoVerificacion || '';

  const resultadoPanelType = resultado === 'pasa' ? 'success' : resultado === 'falla' ? 'error' : 'note';
  const priorityPanelType  = { Highest:'error', High:'warning', Medium:'note', Low:'info', Lowest:'info' }[priority] || 'note';

  return {
    type: 'doc',
    version: 1,
    content: [
      mkPanel('info', [
        mkH('Detalles del origen'),
        mkTable([
          mkTableRow('Origen',        issue.key),
          mkTableRow('Prioridad',     priority),
          mkTableRow('Reportado por', reporter),
          mkTableRow('Asignado a',    assignee),
          mkTableRow('Estado',        f.status?.name || '—'),
          mkTableRow('Creado',        created),
          mkTableRow('Labels',        labels),
        ])
      ]),
      mkRule(),
      mkPanel(resultadoPanelType, [
        mkH('Verificación QA'),
        mkB('Resultado: ' + (resultado === 'pasa' ? 'Pasa' : resultado === 'falla' ? 'Falla' : 'Pendiente')),
        mkP(resultados),
      ]),
      mkRule(),
      mkH('Descripción original del Bug'),
      mkP(descText),
    ]
  };
}

// ── Submit ────────────────────────────────────────────────────────────────────

async function subirTodoAQAA() {
  if (queue.length === 0 || submitting) return;
  submitting = true;
  updateSubmitBtn();

  const progEl = document.getElementById('progress-text');
  const banner = document.getElementById('summary-banner');
  banner.className = 'summary-banner';

  let creadas      = 0;
  let actualizadas = 0;
  let fail         = 0;
  const total = queue.length;

  for (let i = 0; i < queue.length; i++) {
    const key   = queue[i];
    const issue = bugs[key];
    const finalizar = colaItems[key]?.marcarFinalizada === true;
    progEl.textContent = `${i + 1}/${total} sincronizando${finalizar ? ' y finalizando' : ''}...`;

    const resultArea = document.getElementById(`result-${key}`);
    if (resultArea) {
      resultArea.innerHTML = '<span class="card-result-badge badge-progress">Procesando...</span>';
    }

    try {
      const result   = await sincronizarSubtareaQAA(issue, finalizar);
      const createdKey = result.key;
      const esFalla    = colaItems[key]?.resultadoVerificacion === 'falla';

      if (result.mode === 'updated') actualizadas++; else creadas++;

      if (resultArea) {
        const retestLink = esFalla
          ? ` <button onclick="abrirRetest('${esc(createdKey)}')"
                style="display:inline-flex;align-items:center;gap:3px;margin-left:6px;padding:2px 8px;border-radius:5px;background:#ede9fe;color:#5b21b6;border:1px solid #c4b5fd;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;">↩ Retest</button>`
          : '';
        const badgeClass = result.mode === 'updated' ? 'badge-updated' : 'badge-ok';
        const icon       = result.mode === 'updated' ? '↻' : '✓';
        const detalle    = result.changes.length
          ? ` title="${esc(result.changes.join(', '))}"`
          : '';
        resultArea.innerHTML = `<span class="card-result-badge ${badgeClass}"${detalle}><a href="${APP_CONFIG.jira.browseUrl}${esc(createdKey)}" target="_blank" style="color:inherit;text-decoration:underline;">${esc(createdKey)}</a> ${icon}${retestLink}</span>`;
      }
      const removeBtn = document.querySelector(`#drop-zone .bug-card[data-key="${key}"] .btn-remove-queue`);
      if (removeBtn) removeBtn.disabled = true;
    } catch (e) {
      fail++;
      if (resultArea) {
        resultArea.innerHTML = `<span class="card-result-badge badge-fail">Error: ${esc(e.message)}</span>`;
      }
    }
  }

  progEl.textContent = '';
  submitting = false;

  const ok = creadas + actualizadas;
  const partes = [];
  if (creadas)      partes.push(`${creadas} creada${creadas !== 1 ? 's' : ''}`);
  if (actualizadas) partes.push(`${actualizadas} actualizada${actualizadas !== 1 ? 's' : ''}`);
  if (fail)         partes.push(`${fail} fallida${fail !== 1 ? 's' : ''}`);

  if (fail === 0) {
    banner.className   = 'summary-banner show ok';
    banner.textContent = partes.join(' · ') + ` en ${APP_CONFIG.projects.qa}.`;
    const failKeys = queue.filter(k => {
      const ra = document.getElementById(`result-${k}`);
      return ra && ra.querySelector('.badge-fail');
    });
    queue.length = 0;
    failKeys.forEach(k => queue.push(k));
  } else {
    banner.className   = 'summary-banner show warn';
    banner.textContent = partes.join(' · ') + '. Las cards con error quedan en la cola.';
  }

  updateQueueCount();
  updateSubmitBtn();
}

// ── Búsqueda de subtarea QAA existente para un BG dado ───────────────────────
// Estrategia: JQL por label `bg-{bgkey}`. Fallback: scan de issuelinks del BG.
async function buscarSubtareaQAAExistente(bgKey) {
  // bgKey ya viene en minúsculas (ej. "bg-146" / "sp-12"); el prefijo es su proyecto.
  const labelKey = bgKey.split('-')[0] + '-' + bgKey.toLowerCase();
  const fields   = 'summary,description,priority,fixVersions,labels,status,attachment,issuelinks';

  // 1) Intento por label
  try {
    const jql = encodeURIComponent(`project = ${APP_CONFIG.projects.qa} AND labels = "${labelKey}"`);
    const r = await fetch(`${JIRA_BASE}/rest/api/3/search/jql?jql=${jql}&fields=${fields}&maxResults=1`, {
      headers: { Accept: 'application/json' }
    });
    if (r.ok) {
      const data = await r.json();
      const issues = data.issues || [];
      if (issues.length) return issues[0];
    }
  } catch {}

  // 2) Fallback por issuelinks del BG
  try {
    const r = await fetch(`${JIRA_BASE}/rest/api/3/issue/${bgKey}?fields=issuelinks`, {
      headers: { Accept: 'application/json' }
    });
    if (r.ok) {
      const data = await r.json();
      const links = data.fields?.issuelinks || [];
      const qaaKey = links
        .flatMap(l => [l.inwardIssue?.key, l.outwardIssue?.key])
        .filter(Boolean)
        .find(k => k.startsWith(APP_CONFIG.projects.qa + '-') && k !== QAA_PARENT);
      if (qaaKey) {
        const r2 = await fetch(`${JIRA_BASE}/rest/api/3/issue/${qaaKey}?fields=${fields}`, {
          headers: { Accept: 'application/json' }
        });
        if (r2.ok) return await r2.json();
      }
    }
  } catch {}

  return null;
}

// ── Helpers de diff e idempotencia ───────────────────────────────────────────
function _parseJiraError(errBody, status) {
  let errMsg = `HTTP ${status}`;
  try {
    const errData = JSON.parse(errBody);
    const msgs = [...(errData.errorMessages || [])];
    Object.values(errData.errors || {}).forEach(v => { if (!msgs.includes(v)) msgs.push(v); });
    if (msgs.length) errMsg = msgs.join(' · ');
  } catch {}
  return errMsg;
}

function _eqLabels(a, b) {
  const sa = new Set(a || []); const sb = new Set(b || []);
  if (sa.size !== sb.size) return false;
  for (const v of sa) if (!sb.has(v)) return false;
  return true;
}

function _eqFixVersions(a, b) {
  const sa = new Set((a || []).map(v => v.name));
  const sb = new Set((b || []).map(v => v.name));
  if (sa.size !== sb.size) return false;
  for (const v of sa) if (!sb.has(v)) return false;
  return true;
}

function _adfContieneKey(adf, key) {
  if (!adf || !key) return false;
  let found = false;
  const target = key.toUpperCase();
  function walk(node) {
    if (found || !node) return;
    if (node.type === 'inlineCard' && node.attrs?.url?.toUpperCase().includes(target)) { found = true; return; }
    if (node.type === 'text' && (node.text || '').toUpperCase().includes(target)) {
      const marks = node.marks || [];
      if (marks.some(m => m.type === 'link') || /[A-Z]+-\d+/.test(node.text)) { found = true; return; }
    }
    (node.content || []).forEach(walk);
  }
  (adf.content || []).forEach(walk);
  return found;
}

function _existeLink(links, keyA, keyB) {
  return (links || []).some(l => {
    const i = l.inwardIssue?.key, o = l.outwardIssue?.key;
    return (i === keyA && o === keyB) || (i === keyB && o === keyA);
  });
}

// ── Función principal: sincroniza (crea o actualiza) subtarea QAA ────────────
async function sincronizarSubtareaQAA(issue, finalizar = false) {
  const f      = issue.fields;
  const bgKey  = issue.key.toLowerCase();
  const item   = colaItems[issue.key];

  const resultado = item?.resultadoVerificacion || '';
  // Prefijo de trazabilidad según el proyecto origen (bg / sp / …).
  const proj = issue.key.split('-')[0].toLowerCase();
  const baseLabels = ['verificacion-' + proj, proj + '-' + bgKey];
  if (resultado === 'falla') baseLabels.push('retest');

  const expectedFields = {
    summary:     f.summary || issue.key,
    priority:    { name: f.priority?.name || 'Medium' },
    labels:      baseLabels,
    description: buildDescription(issue),
    ...(versionActual ? { fixVersions: [{ name: versionActual }] } : {})
  };

  const existing = await buscarSubtareaQAAExistente(bgKey);
  const changes  = [];
  let qaaKey, mode;

  // ── A) UPDATE: ya existe la subtarea QAA ───────────────────────────────────
  if (existing) {
    qaaKey = existing.key;
    mode   = 'updated';
    const ex = existing.fields || {};

    const diff = {};
    if ((ex.summary || '') !== expectedFields.summary) {
      diff.summary = expectedFields.summary; changes.push('summary');
    }
    if ((ex.priority?.name || '') !== expectedFields.priority.name) {
      diff.priority = expectedFields.priority; changes.push('priority');
    }
    if (!_eqLabels(ex.labels, expectedFields.labels)) {
      diff.labels = expectedFields.labels; changes.push('labels');
    }
    if (expectedFields.fixVersions && !_eqFixVersions(ex.fixVersions, expectedFields.fixVersions)) {
      diff.fixVersions = expectedFields.fixVersions; changes.push('fixVersions');
    }
    if (JSON.stringify(ex.description || null) !== JSON.stringify(expectedFields.description)) {
      diff.description = expectedFields.description; changes.push('description');
    }

    if (Object.keys(diff).length) {
      console.log(`[QAA] PUT diff → ${qaaKey}:`, JSON.stringify(diff, null, 2));

      const intentarPut = async (fields) => {
        const r = await fetch(`${JIRA_BASE}/rest/api/3/issue/${qaaKey}`, {
          method:  'PUT',
          headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
          body:    JSON.stringify({ fields })
        });
        return { ok: r.ok, status: r.status, errBody: r.ok ? '' : await r.text() };
      };

      let res = await intentarPut(diff);

      // Retry sin priority si falló (priority suele estar restringido en edit screen)
      if (!res.ok && res.status === 400 && diff.priority) {
        console.warn(`[QAA] PUT falló (${res.status}) con priority → reintentando sin priority`);
        const { priority, ...rest } = diff;
        if (Object.keys(rest).length) {
          res = await intentarPut(rest);
          if (res.ok) changes.push('skipped:priority');
        }
      }

      // Retry sin fixVersions si todavía falla
      if (!res.ok && res.status === 400 && diff.fixVersions) {
        console.warn(`[QAA] PUT falló (${res.status}) con fixVersions → reintentando sin fixVersions`);
        const { priority, fixVersions, ...rest } = diff;
        if (Object.keys(rest).length) {
          res = await intentarPut(rest);
          if (res.ok) changes.push('skipped:priority+fixVersions');
        }
      }

      if (!res.ok) {
        console.error(`[QAA] PUT ${qaaKey} falló definitivo:`, res.errBody);
        throw new Error(_parseJiraError(res.errBody, res.status));
      }
    }

  // ── B) CREATE: no existe, la creamos ──────────────────────────────────────
  } else {
    mode = 'created';
    const payload = {
      fields: {
        project:                     { key: APP_CONFIG.projects.qa },
        parent:                      { key: QAA_PARENT },
        [APP_CONFIG.fields.epicLink]: QAA_PARENT,
        issuetype:                   { name: 'Tarea' },
        ...expectedFields
      }
    };
    console.log(`[QAA] POST create → ${issue.key}`);
    const r = await fetch(`${JIRA_BASE}/rest/api/3/issue`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
      body:    JSON.stringify(payload)
    });
    if (!r.ok) throw new Error(_parseJiraError(await r.text(), r.status));
    qaaKey = (await r.json()).key;
    changes.push('creada');
  }

  // ── Sync adjuntos: comparar por filename y subir solo los faltantes ───────
  let bgAttachments = [];
  let bgCurrentDesc = null;
  let bgLabels      = [];
  try {
    const attRes = await fetch(`${JIRA_BASE}/rest/api/3/issue/${issue.key}?fields=attachment,description,labels`, {
      headers: { Accept: 'application/json' }
    });
    if (attRes.ok) {
      const attData  = await attRes.json();
      bgAttachments  = attData.fields?.attachment   || [];
      bgCurrentDesc  = attData.fields?.description  || null;
      bgLabels       = attData.fields?.labels       || [];
    }
  } catch {}

  let qaaAttachments = existing?.fields?.attachment || [];
  if (existing && !qaaAttachments.length) {
    try {
      const r = await fetch(`${JIRA_BASE}/rest/api/3/issue/${qaaKey}?fields=attachment`, { headers: { Accept: 'application/json' } });
      if (r.ok) qaaAttachments = (await r.json()).fields?.attachment || [];
    } catch {}
  }
  const qaaFilenames = new Set(qaaAttachments.map(a => a.filename));

  for (const att of bgAttachments) {
    if (qaaFilenames.has(att.filename)) continue;
    try {
      const blob = await fetch(`${JIRA_BASE}/rest/api/3/attachment/content/${att.id}`)
        .then(res => { if (!res.ok) throw new Error(); return res.blob(); });
      const fd = new FormData();
      fd.append('file', blob, att.filename);
      await fetch(`${JIRA_BASE}/rest/api/3/issue/${qaaKey}/attachments`, {
        method:  'POST',
        headers: { 'X-Atlassian-Token': 'no-check' },
        body:    fd
      });
      qaaFilenames.add(att.filename);
      changes.push(`adj:${att.filename}`);
    } catch {}
  }

  const bgFilenames = new Set(bgAttachments.map(a => a.filename));
  if (item?.adjuntosNuevos?.length) {
    for (const file of item.adjuntosNuevos) {
      if (!qaaFilenames.has(file.name)) {
        try {
          const fd = new FormData();
          fd.append('file', file, file.name);
          await fetch(`${JIRA_BASE}/rest/api/3/issue/${qaaKey}/attachments`, {
            method:  'POST',
            headers: { 'X-Atlassian-Token': 'no-check' },
            body:    fd
          });
          qaaFilenames.add(file.name);
          changes.push(`adj-nuevo:${file.name}`);
        } catch {}
      }
      if (!bgFilenames.has(file.name)) {
        try {
          const fd2 = new FormData();
          fd2.append('file', file, file.name);
          await fetch(`${JIRA_BASE}/rest/api/3/issue/${issue.key}/attachments`, {
            method:  'POST',
            headers: { 'X-Atlassian-Token': 'no-check' },
            body:    fd2
          });
          bgFilenames.add(file.name);
        } catch {}
      }
    }
  }

  // ── Sync descripción BG: solo append si la key QAA no está ya en la desc ──
  if (!_adfContieneKey(bgCurrentDesc, qaaKey)) {
    const resultados = item?.resultadosObtenidos?.trim();
    const resultLabel = resultado === 'pasa'
      ? '✓ Verificación QA: PASA'
      : resultado === 'falla'
        ? '✗ Verificación QA: FALLA — requiere retest'
        : 'Verificación QA';
    try {
      const appendNodes = [
        mkRule(),
        mkH(resultLabel),
        ...(resultados ? [mkH('Resultado obtenido'), mkP(resultados)] : []),
        mkH(`Subtarea ${APP_CONFIG.projects.qa} vinculada`),
        { type:'paragraph', content:[ mkIssueLink(qaaKey) ] }
      ];
      const newDesc = bgCurrentDesc
        ? { ...bgCurrentDesc, content: [...(bgCurrentDesc.content || []), ...appendNodes] }
        : { type: 'doc', version: 1, content: appendNodes };
      await fetch(`${JIRA_BASE}/rest/api/3/issue/${issue.key}`, {
        method:  'PUT',
        headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
        body:    JSON.stringify({ fields: { description: newDesc } })
      });
      changes.push('bg-desc');
    } catch {}
  }

  // ── Sync label de versión en el BG ────────────────────────────────────────
  // El proyecto BG no tiene versions definidas (no son globales en Jira),
  // así que usamos un label igual al nombre de la versión (ej. "test-v003").
  // Eso permite filtrar/agrupar BGs por versión en history.html y en el reporte
  // Confluence sin necesidad de admin para crear la versión en BG.
  if (versionActual && !bgLabels.includes(versionActual)) {
    try {
      const newLabels = [...new Set([...bgLabels, versionActual])];
      const r = await fetch(`${JIRA_BASE}/rest/api/3/issue/${issue.key}`, {
        method:  'PUT',
        headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
        body:    JSON.stringify({ fields: { labels: newLabels } })
      });
      if (r.ok) {
        changes.push(`bg-label:${versionActual}`);
      } else {
        console.warn(`[BG label versión] PUT ${issue.key} HTTP ${r.status}`);
      }
    } catch (e) { console.warn(`[BG label versión] error:`, e.message); }
  }

  // ── Sync issueLinks: comparar y crear solo los faltantes ──────────────────
  let qaaLinks = existing?.fields?.issuelinks || [];
  if (existing && !qaaLinks.length) {
    try {
      const r = await fetch(`${JIRA_BASE}/rest/api/3/issue/${qaaKey}?fields=issuelinks`, { headers: { Accept: 'application/json' } });
      if (r.ok) qaaLinks = (await r.json()).fields?.issuelinks || [];
    } catch {}
  }
  const bgLinks = (await fetch(`${JIRA_BASE}/rest/api/3/issue/${issue.key}?fields=issuelinks`, { headers: { Accept: 'application/json' } })
    .then(r => r.ok ? r.json() : null).catch(() => null))?.fields?.issuelinks || [];

  async function crearLink(keyA, keyB) {
    try {
      const r = await fetch(`${JIRA_BASE}/rest/api/3/issueLink`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
        body:    JSON.stringify({ type: { name: 'Relates' }, inwardIssue: { key: keyA }, outwardIssue: { key: keyB } })
      });
      console.log(`[LINK] ${keyA} ↔ ${keyB} → ${r.status}`);
      return r.ok;
    } catch (e) { console.error('[LINK ERROR]', e); return false; }
  }

  if (!_existeLink(qaaLinks, qaaKey, issue.key)) {
    if (await crearLink(qaaKey, issue.key)) changes.push('link:qaa-bg');
  }
  if (!_existeLink(qaaLinks, qaaKey, QAA_PARENT)) {
    if (await crearLink(qaaKey, QAA_PARENT)) changes.push('link:qaa-parent');
  }
  if (item?.agregarAlEpic && !_existeLink(bgLinks, QAA_PARENT, issue.key)) {
    if (await crearLink(QAA_PARENT, issue.key)) changes.push('link:parent-bg');
  }

  // ── Transicionar QAA a Done si finalizar (solo si no está ya en Done) ─────
  if (finalizar) {
    const yaDone = existing?.fields?.status?.statusCategory?.key === 'done';
    if (!yaDone) {
      try {
        const tRes = await fetch(`${JIRA_BASE}/rest/api/3/issue/${qaaKey}/transitions`, {
          headers: { Accept: 'application/json' }
        });
        if (tRes.ok) {
          const transitions = (await tRes.json()).transitions || [];
          const target = transitions.find(t => /done|terminad|listo|cerrad|resuelto|complete|finish/i.test(t.name))
                      || transitions.find(t => t.to?.statusCategory?.key === 'done');
          if (target) {
            await fetch(`${JIRA_BASE}/rest/api/3/issue/${qaaKey}/transitions`, {
              method:  'POST',
              headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
              body:    JSON.stringify({ transition: { id: target.id } })
            });
            changes.push('finalizada');
          }
        }
      } catch {}
    }
  }

  // ── Transicionar BG (si no se aplicó en tiempo real) ──────────────────────
  if (item?.selectedBgTransition && !item?.bgTransitionAplicada) {
    try {
      await fetch(`${JIRA_BASE}/rest/api/3/issue/${issue.key}/transitions`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
        body:    JSON.stringify({ transition: { id: item.selectedBgTransition } })
      });
      item.bgTransitionAplicada = true;
      changes.push('bg-transition');
    } catch {}
  }

  return { key: qaaKey, mode, changes };
}

// ── Lightbox ──────────────────────────────────────────────────────────────────

function abrirLightbox(src, filename) {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:2000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;';

  const img = document.createElement('img');
  img.src = src;
  img.alt = filename;
  img.style.cssText = 'max-width:90vw;max-height:82vh;border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,.6);object-fit:contain;';

  const footer = document.createElement('div');
  footer.style.cssText = 'margin-top:12px;display:flex;align-items:center;gap:14px;';

  const nameEl = document.createElement('span');
  nameEl.textContent = filename;
  nameEl.style.cssText = 'font-size:12px;color:rgba(255,255,255,.7);max-width:60vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;';

  const btnCerrar = document.createElement('button');
  btnCerrar.textContent = 'Cerrar';
  btnCerrar.style.cssText = 'background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:6px;padding:5px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .12s;';
  btnCerrar.addEventListener('mouseenter', () => { btnCerrar.style.background = 'rgba(255,255,255,.25)'; });
  btnCerrar.addEventListener('mouseleave', () => { btnCerrar.style.background = 'rgba(255,255,255,.15)'; });
  btnCerrar.addEventListener('click', () => overlay.remove());

  footer.appendChild(nameEl);
  footer.appendChild(btnCerrar);

  overlay.appendChild(img);
  overlay.appendChild(footer);

  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  document.addEventListener('keydown', function onKey(e) {
    if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', onKey); }
  });

  document.body.appendChild(overlay);
}

// ── Retest routing ───────────────────────────────────────────────────────────

async function abrirRetest(qaaKey) {
  try {
    const r = await fetch(`${JIRA_BASE}/rest/api/3/issue/${qaaKey}?fields=labels`, {
      headers: { Accept: 'application/json' }
    });
    if (r.ok) {
      const data   = await r.json();
      const labels = data.fields?.labels || [];
      // Evidencia de verificación (BG o SP) → el retest vuelve a esta herramienta.
      if (labels.some(l => l.startsWith('verificacion-'))) {
        window.open('/bg-verificacion', '_blank');
        return;
      }
    }
  } catch {}
  window.open(`/?edit=${qaaKey}&forceRetest=1`, '_blank');
}

// ── Utils ─────────────────────────────────────────────────────────────────────

function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Tabs ─────────────────────────────────────────────────────────────────────

function cambiarTab(name) {
  document.querySelectorAll('[data-tab]').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.dataset.panel === name));
  try { localStorage.setItem('bg-verif:tab', name); } catch {}
  if (name === 'bulk' && !bulkState.cargado) cargarBulkEpics();
}
