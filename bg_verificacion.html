<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verificación de bugs</title>
<link rel="stylesheet" href="/styles.css">
<script src="/config.js"></script>
<script src="/epic-filter.js"></script>
<script src="/board-switcher.js"></script>
<script src="/labels.js"></script>
<script src="/bulk-epic.js"></script>
<style>
body { padding: 20px 16px 40px; }

.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  align-items: start;
}

/* ── Tab panels (visibility) ────────────────────────────────────────────── */
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── Botones de tab en el header ────────────────────────────────────────── */
.btn-hdr-tab { position: relative; }
.btn-hdr-tab.active {
  background: linear-gradient(135deg, #0f6e56 0%, #10b981 100%) !important;
  border-color: rgba(16,185,129,.6) !important;
  color: white !important;
  box-shadow: 0 2px 8px rgba(15,110,86,.4);
}
.btn-hdr-tab.active svg { stroke: white !important; }

/* ── Bulk por Epic ──────────────────────────────────────────────────────── */
.bulk-layout {
  display: grid;
  grid-template-columns: 320px 1fr;
  gap: 20px;
  align-items: start;
}
.bulk-epic-list {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--rl);
  box-shadow: var(--s1);
  max-height: 75vh;
  overflow-y: auto;
}
.bulk-epic-item {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  gap: 4px;
  transition: background .12s;
}
.bulk-epic-item:hover { background: var(--g0); }
.bulk-epic-item.selected { background: #eff6ff; border-left: 3px solid #2563eb; padding-left: 11px; }
.bulk-epic-item-key { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 10px; font-weight: 700; color: var(--g6); }
.bulk-epic-item-name { font-size: 13px; font-weight: 600; color: var(--g8); }
.bulk-epic-item-count {
  display: inline-block;
  margin-top: 2px;
  font-size: 10px;
  font-weight: 700;
  color: #1e3a8a;
  background: #dbeafe;
  border: 1px solid #93c5fd;
  border-radius: 10px;
  padding: 1px 8px;
  width: max-content;
}
.bulk-epic-item-count.zero { color: #065f46; background: #d1fae5; border-color: #6ee7b7; }
.bulk-detail {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--rl);
  box-shadow: var(--s1);
  padding: 20px;
  min-height: 400px;
}
.bulk-detail-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 360px;
  color: var(--sub);
  text-align: center;
  gap: 10px;
}
.bulk-detail-empty svg { width: 48px; height: 48px; opacity: .35; }
.bulk-detail-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 16px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
.bulk-detail-title { font-size: 16px; font-weight: 700; color: var(--g8); }
.bulk-detail-sub   { font-size: 12px; color: var(--sub); margin-top: 3px; }
.bulk-task-list {
  max-height: 280px;
  overflow-y: auto;
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 16px;
  background: var(--g0);
}
.bulk-task-row {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
}
.bulk-task-row:last-child { border-bottom: none; }
.bulk-task-row .badge-key { font-size: 9px; }
.bulk-task-summary { color: var(--g7); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bulk-task-status  { font-size: 10px; font-weight: 700; color: var(--g6); background: var(--white); border: 1px solid var(--g2); border-radius: 10px; padding: 1px 7px; }
.bulk-form-group { margin-bottom: 14px; }
.bulk-form-label { display: block; font-size: 11px; font-weight: 700; color: var(--g7); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
.bulk-radio-row { display: flex; gap: 10px; }
.bulk-radio {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px;
  border: 2px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  font-weight: 700;
  font-size: 12px;
  background: var(--white);
  transition: all .15s;
}
.bulk-radio.selected.pasa  { border-color: #10b981; background: #ecfdf5; color: #065f46; }
.bulk-radio.selected.falla { border-color: var(--red-b); background: var(--red-bg); color: var(--red); }
.bulk-textarea {
  width: 100%;
  min-height: 80px;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px;
  font-family: inherit;
  font-size: 13px;
  resize: vertical;
}
.bulk-textarea:focus { outline: 2px solid #93c5fd; outline-offset: 1px; border-color: #2563eb; }
.bulk-files {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.bulk-file-row { display: flex; align-items: center; gap: 8px; padding: 5px 9px; background: var(--g0); border-radius: 6px; font-size: 11px; }
.bulk-file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--g7); }
.bulk-file-remove { background: none; border: none; color: var(--red); cursor: pointer; font-weight: 700; font-size: 14px; line-height: 1; padding: 0 4px; }
.bulk-actions { display: flex; align-items: center; gap: 12px; margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--border); }
.bulk-progress { font-size: 12px; color: var(--sub); flex: 1; }
.bulk-btn-complete {
  background: linear-gradient(135deg, #0f6e56 0%, #10b981 100%);
  color: white;
  border: none;
  border-radius: 8px;
  padding: 11px 22px;
  font-weight: 700;
  font-size: 13px;
  cursor: pointer;
  font-family: inherit;
  transition: all .15s;
  box-shadow: 0 2px 8px rgba(15,110,86,.25);
}
.bulk-btn-complete:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(15,110,86,.35); }
.bulk-btn-complete:disabled { opacity: .5; cursor: not-allowed; }
.checkbox-label {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  font-size: 12px;
  font-weight: 600;
  color: var(--g5);
  cursor: pointer;
  padding: 8px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--g0);
  transition: border-color .15s, color .15s, background .15s;
  white-space: nowrap;
  user-select: none;
}
.checkbox-label:has(input:checked) {
  border-color: #10b981;
  color: #065f46;
  background: rgba(16,185,129,.08);
}
.checkbox-label input[type="checkbox"] { accent-color: #10b981; width: 14px; height: 14px; cursor: pointer; }

.col-panel {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--rl);
  box-shadow: var(--s1);
  display: flex;
  flex-direction: column;
  min-height: 500px;
}

.col-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 20px;
  background: linear-gradient(90deg, var(--g0), var(--white));
  border-bottom: 1px solid var(--border);
  border-radius: var(--rl) var(--rl) 0 0;
}

.col-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--g9);
  text-transform: uppercase;
  letter-spacing: .06em;
  flex: 1;
}

.col-count {
  font-size: 11px;
  font-weight: 700;
  color: var(--white);
  background: var(--g7);
  border-radius: 100px;
  padding: 2px 9px;
  min-width: 24px;
  text-align: center;
}

.col-count.zero { background: var(--muted); }

.btn-reload {
  display: flex;
  align-items: center;
  gap: 5px;
  background: none;
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 5px 10px;
  font-size: 11px;
  font-weight: 600;
  color: var(--sub);
  cursor: pointer;
  font-family: inherit;
  transition: all .15s;
}

.btn-reload:hover { border-color: var(--g4); color: var(--g7); }
.btn-reload:disabled { opacity: .65; cursor: wait; }
.btn-reload svg { width: 11px; height: 11px; stroke: currentColor; }
.btn-reload.is-loading svg { animation: spin .8s linear infinite; }

.col-body {
  flex: 1;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  overflow-y: auto;
  max-height: calc(100vh - 260px);
  min-height: 120px;
}

/* ── Cards BG ── */
.bug-card {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: var(--r);
  padding: 12px 14px;
  cursor: grab;
  transition: all .15s;
  user-select: none;
}

.bug-card:hover { border-color: var(--g4); box-shadow: var(--s1); }
.bug-card.dragging { opacity: .4; cursor: grabbing; }
.bug-card.in-queue { border-color: var(--g4); background: var(--g0); }

.card-top {
  display: flex;
  align-items: center;
  gap: 7px;
  margin-bottom: 7px;
  flex-wrap: wrap;
}

.badge-key {
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 10px;
  font-weight: 700;
  color: var(--g7);
  background: var(--g0);
  border: 1px solid var(--g2);
  border-radius: 4px;
  padding: 2px 7px;
  white-space: nowrap;
  text-decoration: none;
  transition: all .15s;
}
a.badge-key { cursor: pointer; }
a.badge-key:hover { color: #0052cc; border-color: #b3d4ff; background: #e9f2ff; }

.badge-priority {
  font-size: 10px;
  font-weight: 700;
  border-radius: 4px;
  padding: 2px 7px;
  white-space: nowrap;
}

.priority-highest { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
.priority-high    { background: #fff7ed; color: #c2410c; border: 1px solid #fed7aa; }
.priority-medium  { background: #fefce8; color: #a16207; border: 1px solid #fde047; }
.priority-low     { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
.priority-lowest  { background: #f8fafc; color: var(--muted); border: 1px solid var(--border); }

.badge-retest {
  font-size: 10px;
  font-weight: 700;
  border-radius: 4px;
  padding: 2px 7px;
  white-space: nowrap;
  background: #ede9fe;
  color: #5b21b6;
  border: 1px solid #c4b5fd;
  cursor: pointer;
  transition: all .15s;
  font-family: inherit;
}
.badge-retest:hover { background: #c4b5fd; color: #3b0764; }

.card-summary {
  font-size: 13px;
  color: var(--text);
  font-weight: 600;
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 7px;
}

.card-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 11px;
  color: var(--muted);
  flex-wrap: wrap;
}

.card-meta-item {
  display: flex;
  align-items: center;
  gap: 4px;
}

.card-meta-item svg { width: 10px; height: 10px; stroke: currentColor; flex-shrink: 0; }

/* ── Queue card extra ── */
.queue-card {
  display: flex;
  align-items: flex-start;
  gap: 10px;
}

.queue-card-info { flex: 1; min-width: 0; }

.btn-remove-queue {
  width: 22px;
  height: 22px;
  flex-shrink: 0;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: var(--white);
  color: var(--muted);
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .15s;
  line-height: 1;
  margin-top: 2px;
}

.btn-remove-queue:hover { border-color: var(--red-b); color: var(--red); background: var(--red-bg); }

/* ── Card status badge (post-submit) ── */
.card-result-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  font-weight: 700;
  border-radius: 5px;
  padding: 3px 8px;
  margin-top: 6px;
}

.badge-ok    { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; }
.badge-fail  { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-b); }
.badge-progress { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }
.badge-updated  { background: #dbeafe; color: #1e3a8a; border: 1px solid #93c5fd; }

/* ── Drop zone ── */
.drop-zone {
  border: 2px dashed var(--border);
  border-radius: var(--r);
  min-height: 120px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .2s;
  color: var(--muted);
  font-size: 13px;
  flex-direction: column;
  gap: 6px;
  padding: 20px;
}

.drop-zone.has-items {
  border-color: transparent;
  min-height: 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  gap: 10px;
  align-items: stretch;
  justify-content: flex-start;
}

.drop-zone.drag-over {
  border-color: var(--g6);
  background: var(--g0);
  color: var(--g7);
}

.drop-zone svg { width: 28px; height: 28px; stroke: currentColor; opacity: .4; }
.drop-zone span { font-size: 12px; }

/* ── Col footer ── */
.col-footer {
  padding: 12px 14px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.footer-btns {
  display: flex;
  gap: 8px;
}

.btn-submit-qaa {
  flex: 1;
  background: linear-gradient(135deg, var(--g8) 0%, var(--g6) 100%);
  color: #fff;
  border: none;
  border-radius: var(--r);
  padding: 10px 16px;
  font-size: 13px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  box-shadow: 0 2px 8px rgba(15,110,86,.25);
  transition: all .15s;
}

.btn-submit-qaa:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(15,110,86,.35); }
.btn-submit-qaa:disabled { background: #6ee7b7; color: #065f46; box-shadow: none; cursor: not-allowed; transform: none; opacity: .6; }

.btn-submit-secondary {
  flex: 1;
  background: var(--white);
  color: var(--g7);
  border: 1.5px solid var(--g4);
  border-radius: var(--r);
  padding: 10px 16px;
  font-size: 13px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all .15s;
}
.btn-submit-secondary:hover:not(:disabled) { border-color: var(--g6); background: var(--g0); }
.btn-submit-secondary:disabled { background: var(--g0); border-color: var(--g2); color: var(--g4); cursor: not-allowed; opacity: .7; }

.progress-text { font-size: 12px; color: var(--sub); white-space: nowrap; }

/* ── States ── */
.state-loading, .state-empty, .state-error {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 32px 16px;
  color: var(--muted);
  font-size: 13px;
  text-align: center;
}

.state-loading .spin {
  width: 20px; height: 20px;
  border: 2.5px solid var(--border);
  border-top-color: var(--g6);
  border-radius: 50%;
  animation: spin .6s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.state-error { color: var(--red); }
.state-error svg { width: 24px; height: 24px; stroke: currentColor; }

.state-empty svg { width: 28px; height: 28px; stroke: currentColor; opacity: .35; }

/* ── Summary toast ── */
.summary-banner {
  padding: 10px 14px;
  border-radius: var(--r);
  font-size: 12px;
  font-weight: 600;
  display: none;
  margin: 10px 14px 0;
  line-height: 1.5;
}

.summary-banner.show { display: block; }
.summary-banner.ok   { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; }
.summary-banner.warn { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-b); }

@media (max-width: 720px) {
  .two-col { grid-template-columns: 1fr; }
  .col-body { max-height: 50vh; }
  /* Al apilarse, no forzar paneles altos y vacíos */
  .col-panel { min-height: 0; }

  /* Bulk por Epic: el sidebar pasa arriba en una sola columna;
     la lista de epics scrollea con altura acotada para no comerse la pantalla */
  .bulk-layout { grid-template-columns: 1fr; }
  .bulk-epic-list { max-height: 40vh; }
  .bulk-detail { min-height: 0; }
}

@media (max-width: 640px) {
  body { padding: 16px 14px 40px; }
  .bulk-detail { padding: 16px; }
  .bulk-radio-row { flex-wrap: wrap; }
  .bulk-actions { flex-wrap: wrap; gap: 10px; }
  .bulk-progress { flex-basis: 100%; }
}

@media (max-width: 480px) {
  body { padding: 14px 10px 32px; }
  .two-col { gap: 14px; }
  .col-body { max-height: 44vh; padding: 12px; gap: 8px; }
  .col-header { padding: 12px 14px; }
  .bulk-detail { padding: 14px; }
  .bulk-detail-empty { min-height: 200px; }
  .bulk-btn-complete { width: 100%; }
}

/* ── Queue card extra sections ── */
.queue-sections {
  margin-top: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.queue-section-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--sub);
  text-transform: uppercase;
  letter-spacing: .06em;
  margin-bottom: 4px;
}

.results-textarea {
  width: 100%;
  min-height: 80px;
  background: var(--g0);
  border: 1px solid var(--g2);
  border-radius: 6px;
  color: var(--text);
  font-size: 12px;
  font-family: inherit;
  padding: 8px 10px;
  resize: vertical;
  box-sizing: border-box;
  transition: border-color .15s;
}

.results-textarea:focus {
  outline: none;
  border-color: var(--g4);
}

.results-textarea::placeholder { color: var(--muted); }

.adjuntos-section { display: flex; flex-direction: column; gap: 6px; }

.adjuntos-input-label {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: var(--g0);
  border: 1px dashed var(--g3);
  border-radius: 6px;
  padding: 6px 10px;
  font-size: 11px;
  font-weight: 600;
  color: var(--sub);
  cursor: pointer;
  transition: all .15s;
}

.adjuntos-input-label:hover { border-color: var(--g5); color: var(--g7); background: var(--g1); }
.adjuntos-input-label svg { width: 12px; height: 12px; stroke: currentColor; flex-shrink: 0; }

.adjuntos-previews {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 2px;
}

.preview-file-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.75);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}
.preview-file-box {
  position: relative;
  background: var(--g1);
  border-radius: 10px;
  max-width: 90vw;
  max-height: 90vh;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
.preview-file-full-img {
  max-width: 88vw;
  max-height: 88vh;
  object-fit: contain;
  display: block;
  border-radius: 8px;
}
.preview-file-embed {
  width: 80vw;
  height: 85vh;
  border: none;
}
.preview-file-close {
  position: absolute;
  top: 8px;
  right: 8px;
  background: rgba(0,0,0,.5);
  border: none;
  color: #fff;
  border-radius: 50%;
  width: 28px;
  height: 28px;
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1;
}

.preview-item {
  position: relative;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  border-radius: 6px;
  overflow: visible;
}

.preview-item img {
  width: 72px;
  height: 72px;
  object-fit: cover;
  border-radius: 6px;
  border: 1px solid var(--g2);
  display: block;
}

.preview-file {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  width: 72px;
  height: 72px;
  background: var(--g0);
  border: 1px solid var(--g2);
  border-radius: 6px;
  padding: 6px;
  box-sizing: border-box;
}

.preview-file svg { width: 20px; height: 20px; stroke: var(--sub); flex-shrink: 0; }

.preview-file-name {
  font-size: 9px;
  color: var(--muted);
  text-align: center;
  word-break: break-all;
  max-height: 28px;
  overflow: hidden;
  line-height: 1.3;
}

.btn-remove-preview {

<script>
const JIRA_BASE  = window.location.origin + '/jira';
const QAA_PARENT = APP_CONFIG.epics.verification;

let versionActual = null;

async function cargarVersionActual() {
  try {
    const r = await fetch(`${JIRA_BASE}/rest/api/3/project/${APP_CONFIG.projects.qa}/versions`, {
      headers: { Accept: 'application/json' }
    });
    if (!r.ok) return;
    const activas = (await r.json())
      .filter(v => !v.released && v.name.startsWith(APP_CONFIG.workflow.versionPrefix))
      .sort((a, b) => b.name.localeCompare(a.name));
    if (!activas.length) return;
    versionActual = activas[0].name;
    const badge = document.getElementById('version-badge');
    if (badge) badge.textContent = versionActual;
  } catch {}
}

// State
const bugs       = {};   // key → issue data
const queue      = [];   // keys in queue order
const colaItems  = {};   // key → { resultadosObtenidos: string, adjuntosNuevos: File[] }
let   dragKey    = null;
let   submitting = false;
// Filtros del selector — se pueblan desde la descripción del epic (heading → bloque JQL).
// El primero es el fallback si el epic no carga. { name, jql }
let filtros         = [{ name: `Verificación ${APP_CONFIG.projects.bug}`, jql: `project = ${APP_CONFIG.projects.bug} AND status = ${APP_CONFIG.workflow.bugUnderReviewStatusId} ORDER BY priority DESC, created DESC` }];
let filtroActivoIdx = 0;
function jqlActivo()          { return filtros[filtroActivoIdx]?.jql || filtros[0].jql; }
// Proyecto destino del filtro activo (BG, SP, …) leído de la JQL.
function proyectoFiltroActivo() {
  const m = jqlActivo().match(/project\s*=\s*([A-Za-z][A-Za-z0-9]+)/);
  return m ? m[1].toUpperCase() : '';
}
// El flujo de verificación (Pendientes → Cola → evidencia en QAA) aplica a BG y SP.
function esModoVerificacion() { return [APP_CONFIG.projects.bug, APP_CONFIG.projects.tech].includes(proyectoFiltroActivo()); }

// ── Priority helpers ──────────────────────────────────────────────────────────

function extraerKeyRetest(summary) {
  const m = (summary || '').match(new RegExp(`^(${APP_CONFIG.projects.qa}-\\d+)\\s*[—\\-]`));
  return m ? m[1] : null;
}

function priorityClass(name) {
  const n = (name || '').toLowerCase();
  if (n === 'highest') return 'priority-highest';
  if (n === 'high')    return 'priority-high';
  if (n === 'medium')  return 'priority-medium';
  if (n === 'low')     return 'priority-low';
  return 'priority-lowest';
}

function formatDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('es-AR', { day: '2-digit', month: 'short', year: 'numeric' });
}

function extraerTextoADF(adf) {
  if (typeof adf === 'string') return adf;
  if (!adf || !adf.content) return '';
  const parts = [];
  function walk(node) {
    if (node.type === 'text') { parts.push(node.text || ''); return; }
    (node.content || []).forEach(walk);
    if (['paragraph','heading','listItem'].includes(node.type)) parts.push(' ');
  }
  adf.content.forEach(walk);
  return parts.join('').trim();
}

// ── Dependencia bug↔TC (APP_CONFIG.fields.bgDependency) ──────────────────────


// ── JQL desde epic ────────────────────────────────────────────────────────────

// Texto plano de un nodo ADF (incluye descendientes).
function _textoNodoADF(node) {
  let s = '';
  (function walk(n) { if (n.text) s += n.text; (n.content || []).forEach(walk); })(node);
  return s.trim();
}

// Filtros del selector: cada codeBlock con "project" cuyo nodo inmediatamente
// anterior es un heading. El heading da el nombre. Así las JQL de la sección
// "Métricas" (precedidas por texto, no por heading) quedan fuera del selector.
function extraerFiltrosDeADF(adf) {
  const out = [];
  if (!adf || !adf.content) return out;
  const nodes = adf.content;
  for (let i = 0; i < nodes.length; i++) {
    if (nodes[i].type !== 'codeBlock') continue;
    const code = _textoNodoADF(nodes[i]);
    if (!/project/i.test(code)) continue;
    const prev = nodes[i - 1];
    if (prev && prev.type === 'heading') {
      out.push({ name: _textoNodoADF(prev).replace(/:\s*$/, '').trim(), jql: code });
    }
  }
  return out;
}

async function cargarJqlDesdeEpic() {
  try {
    const r = await fetch(`${JIRA_BASE}/rest/api/3/issue/${QAA_PARENT}?fields=description,${APP_CONFIG.fields.bgDependency}`, {
      headers: { Accept: 'application/json' }
    });
    if (r.ok) {
      const data = await r.json();
      const encontrados = extraerFiltrosDeADF(data.fields?.description);
      if (encontrados.length) { filtros = encontrados; filtroActivoIdx = 0; }
    }
  } catch {}
  renderFiltroSelector();
  aplicarModoVista();
}

// ── Selector de filtro ─────────────────────────────────────────────────────────
function renderFiltroSelector() {
  const sel = document.getElementById('filtro-selector');
  if (!sel) return;
  sel.innerHTML = filtros.map((f, i) => `<option value="${i}">${esc(f.name)}</option>`).join('');
  sel.value = String(filtroActivoIdx);
  sel.style.display = filtros.length > 1 ? '' : 'none';   // si hay uno solo, no tiene sentido mostrarlo
}

function seleccionarFiltro(idx) {
  filtroActivoIdx = Math.max(0, Math.min(filtros.length - 1, Number(idx) || 0));
  aplicarModoVista();
  cargarPendientes();
}

// En modo vista (filtro no-BG) se oculta la columna "Cola QAA" y la lista ocupa todo.
function aplicarModoVista() {
  const verif  = esModoVerificacion();
  const cola   = document.getElementById('cola-qaa-col');
  const twoCol = document.querySelector('.tab-panel[data-panel="verif"] .two-col');
  const title  = document.querySelector('.tab-panel[data-panel="verif"] .col-title');
  if (cola)   cola.style.display = verif ? '' : 'none';
  if (twoCol) twoCol.style.gridTemplateColumns = verif ? '1fr 1fr' : '1fr';
  if (title)  title.textContent = verif ? 'Pendientes' : (filtros[filtroActivoIdx]?.name || 'Tareas');
}

// ── Load pending ─────────────────────────────────────────────────────────────

function _crearLoadingEl() {
  const div = document.createElement('div');
  div.className = 'state-loading';
  div.id        = 'pending-loading';
  div.innerHTML = '<div class="spin"></div><span>Cargando bugs...</span>';
  return div;
}

async function cargarPendientes() {
  const body = document.getElementById('pending-body');
  const btn  = document.getElementById('btn-reload');

  if (btn) { btn.classList.add('is-loading'); btn.disabled = true; }

  try {
    body.innerHTML = '';
    body.appendChild(_crearLoadingEl());

    const epicClause = (proyectoFiltroActivo() === APP_CONFIG.projects.bug) ? EpicFilter.getJqlClause() : '';
    let finalJql = jqlActivo();
    if (epicClause) {
      const orderByIdx = finalJql.toLowerCase().indexOf(' order by');
      finalJql = orderByIdx >= 0
        ? finalJql.slice(0, orderByIdx) + epicClause + finalJql.slice(orderByIdx)
        : finalJql + epicClause;
    }
    const r = await fetch(`${JIRA_BASE}/rest/api/3/search/jql`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
      body: JSON.stringify({
        jql: finalJql,
        fields: ['summary', 'priority', 'assignee', 'reporter', 'created', 'description', 'labels', 'status', APP_CONFIG.fields.bgDependency, APP_CONFIG.fields.epicLink],
        maxResults: 50
      })
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();

    const issues = data.issues || [];

    // Limpiar de la Cola las tarjetas a las que ya se les cambió el estado y que
    // salieron del filtro (ya no son del usuario) — no se devuelven a Pendientes.
    const resultKeys = new Set(issues.map(i => i.key));
    for (const key of [...queue]) {
      if (colaItems[key]?.bgTransitionAplicada && !resultKeys.has(key)) {
        removeFromQueue(key, false);
      }
    }

    body.innerHTML = '';

    if (issues.length === 0) {
      body.appendChild(makeEmptyState(esModoVerificacion() ? 'No hay items en la cola de verificación' : 'No hay tareas en este filtro'));
      updatePendingCount();
      return;
    }

    let pintadas = 0;
    for (const issue of issues) {
      bugs[issue.key] = issue;
      if (!queue.includes(issue.key)) {
        body.appendChild(makePendingCard(issue));
        pintadas++;
      }
    }

    if (pintadas === 0) {
      body.appendChild(makeEmptyState(`Todos los bugs (${issues.length}) ya están en la cola`));
    }

    updatePendingCount();

    // Refrescar datos de las cards que están en cola (status + transiciones)
    refrescarCardsEnCola();
  } catch (e) {
    console.error('[cargarPendientes] error:', e);
    body.innerHTML = '';
    body.appendChild(makeErrorState('Error al cargar: ' + (e?.message || e)));
  } finally {
    if (btn) { btn.classList.remove('is-loading'); btn.disabled = false; }
  }
}

// Refresca el estado actual + transiciones disponibles de cada bug en la cola
async function refrescarCardsEnCola() {
  for (const key of queue) {
    try {
      const r = await fetch(`${JIRA_BASE}/rest/api/3/issue/${key}?fields=status,issuelinks&expand=transitions`, {
        headers: { Accept: 'application/json' }
      });
      if (!r.ok) continue;
      const data = await r.json();
      const item = colaItems[key];
      if (!item) continue;

      const estadoActual = data.fields?.status?.name || null;
      const transitions  = data.transitions || [];

      item.bgCurrentStatus = estadoActual;
      item.bgTransitions   = transitions;

      const sel = document.getElementById(`bg-transition-${key}`);
      if (sel && !item.bgTransitionAplicada) {
        const valActual = sel.value;
        sel.innerHTML = '<option value="">— No cambiar —</option>' +
          transitions.map(t => `<option value="${esc(t.id)}">${esc(t.name)}</option>`).join('');
        if (valActual && transitions.some(t => t.id === valActual)) sel.value = valActual;
        sel.disabled = transitions.length === 0;
      }

      const lbl = document.querySelector(`#drop-zone .bug-card[data-key="${key}"] .estado-row-label`);
      if (lbl && estadoActual && !item.bgTransitionAplicada) {
        lbl.textContent = `${key.split('-')[0]} (${estadoActual}):`;
      }
    } catch {}
  }
}

// ── Card builders ─────────────────────────────────────────────────────────────

function makeRetestBadge(summary, bgKey) {
  const keyFromSummary = extraerKeyRetest(summary);
  if (!keyFromSummary) return null;
  const btn = document.createElement('button');
  btn.className = 'badge-retest';
  btn.textContent = `↩ Retest ${keyFromSummary}`;
  btn.title = `Cargar ${keyFromSummary} para retest`;
  btn.addEventListener('click', async e => {
    e.stopPropagation();
    btn.textContent = '↩ Cargando...';
    btn.disabled = true;
    let qaaKey = keyFromSummary;
    try {
      const r = await fetch(`${JIRA_BASE}/rest/api/3/issue/${bgKey}?fields=issuelinks`, {
        headers: { Accept: 'application/json' }
      });
      if (r.ok) {
        const data  = await r.json();
        const links = data.fields?.issuelinks || [];
        const found = links.find(l =>
          (l.inwardIssue?.key  || '').startsWith(APP_CONFIG.projects.qa + '-') ||
          (l.outwardIssue?.key || '').startsWith(APP_CONFIG.projects.qa + '-')
        );
        if (found) {
          qaaKey = (found.inwardIssue?.key || '').startsWith(APP_CONFIG.projects.qa + '-')
            ? found.inwardIssue.key
            : found.outwardIssue.key;
        }
      }
    } catch {}
    btn.textContent = `↩ Retest ${qaaKey}`;
    btn.disabled = false;
    abrirRetest(qaaKey);
  });
  return btn;
}

function makePendingCard(issue) {
  const f        = issue.fields;
  const priority = f.priority?.name || 'Medium';
  const assignee = f.assignee?.displayName || 'Sin asignar';
  const created  = formatDate(f.created);

  const card = document.createElement('div');
  card.className   = 'bug-card';
  card.draggable   = esModoVerificacion();
  card.dataset.key = issue.key;

  card.innerHTML = `
    <div class="card-top">
      <a class="badge-key" href="${APP_CONFIG.jira.browseUrl}${esc(issue.key)}" target="_blank" rel="noopener noreferrer" title="Abrir ${esc(issue.key)} en Jira" onclick="event.stopPropagation()" draggable="false">${esc(issue.key)}</a>
      <span class="badge-priority ${priorityClass(priority)}">${priority}</span>
    </div>
    <div class="card-summary">${esc(f.summary || '—')}</div>
    <div class="card-meta">
      <span class="card-meta-item">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        ${esc(assignee)}
      </span>
      <span class="card-meta-item">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        ${esc(created)}
      </span>
    </div>`;

  const retestBtn = makeRetestBadge(f.summary, issue.key);
  if (retestBtn) card.querySelector('.card-top').appendChild(retestBtn);

  // Modo vista (filtro no-BG): solo lectura, sin acciones de verificación ni drag.
  if (!esModoVerificacion()) return card;

  // ── Cambiar estado inline ──
  const statusSection = document.createElement('div');
  statusSection.className = 'pending-status-section';

  const btnEstado = document.createElement('button');
  btnEstado.className   = 'pending-status-btn';
  btnEstado.textContent = 'Cambiar estado';
  btnEstado.type        = 'button';

  btnEstado.addEventListener('click', async e => {
    e.stopPropagation();
    btnEstado.textContent = 'Cargando...';
    btnEstado.disabled    = true;
    try {
      const r = await fetch(`${JIRA_BASE}/rest/api/3/issue/${issue.key}/transitions`, {
        headers: { Accept: 'application/json' }
      });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const data        = await r.json();
      const transitions = data.transitions || [];
      if (!transitions.length) { btnEstado.textContent = 'Sin estados'; return; }

      statusSection.innerHTML = '';
      const row = document.createElement('div');
      row.className = 'pending-status-row';

      const sel = document.createElement('select');
      sel.className = 'pending-status-select';
      sel.innerHTML = transitions.map(t => `<option value="${esc(t.id)}">${esc(t.name)}</option>`).join('');

      const btnApply = document.createElement('button');
      btnApply.className   = 'btn-apply-status';
      btnApply.textContent = 'Aplicar';
      btnApply.type        = 'button';
      btnApply.addEventListener('click', async () => {
        btnApply.textContent = '...';
        btnApply.disabled    = true;
        sel.disabled         = true;
        try {
          const res = await fetch(`${JIRA_BASE}/rest/api/3/issue/${issue.key}/transitions`, {
            method:  'POST',
            headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
            body:    JSON.stringify({ transition: { id: sel.value } })
          });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const nombre = sel.options[sel.selectedIndex].text;
          statusSection.innerHTML = '';
          const badge = document.createElement('span');
          badge.className   = 'pending-status-badge';
          badge.textContent = `${nombre} ✓`;
          statusSection.appendChild(badge);
        } catch {
          btnApply.textContent = 'Error';
          setTimeout(() => {
            btnApply.textContent = 'Aplicar';
            btnApply.disabled    = false;
            sel.disabled         = false;
          }, 2000);
        }
      });

      const btnCancel = document.createElement('button');
      btnCancel.className   = 'btn-cancel-status';
      btnCancel.textContent = '×';
      btnCancel.type        = 'button';
      btnCancel.addEventListener('click', () => {
        statusSection.innerHTML = '';
        statusSection.appendChild(btnEstado);
        btnEstado.textContent = 'Cambiar estado';
        btnEstado.disabled    = false;
      });

      row.appendChild(sel);
      row.appendChild(btnApply);
      row.appendChild(btnCancel);
      statusSection.appendChild(row);
    } catch {
      btnEstado.textContent = 'Error al cargar';
      btnEstado.disabled    = false;
    }
  });

  statusSection.appendChild(btnEstado);
  card.appendChild(statusSection);

  // Mover a la cola con un tap — alternativa al drag&drop, que no funciona en touch.
  // Reusa addToQueue(key), la misma función que dispara onDrop (idempotente).
  const btnToQueue = document.createElement('button');
  btnToQueue.className   = 'btn-to-queue';
  btnToQueue.type        = 'button';
  btnToQueue.textContent = '→ Mover a la cola';
  btnToQueue.addEventListener('click', e => {
    e.stopPropagation();
    addToQueue(issue.key);
  });
  card.appendChild(btnToQueue);

  card.addEventListener('dragstart', e => {
    dragKey = issue.key;
    card.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  });
  card.addEventListener('dragend', () => card.classList.remove('dragging'));

  return card;
}

  sections.appendChild(secResultados);

  secAdjuntos.innerHTML = '<div class="queue-section-label">Adjuntos</div>';

  failRow.style.cssText = 'border-color:var(--red-b);background:var(--red-bg);';

  lblBG.textContent = `${projLbl}:`;
  const selBG = document.createElement('select');
  selBG.className = 'estado-select';
  selBG.id        = `bg-transition-${key}`;
  selBG.disabled  = true;
  selBG.innerHTML = '<option value="">Cargando estados...</option>';
  const bgLabelBase = () => {
    const cur = item.bgCurrentStatus;
    return cur ? `${projLbl} (${cur}):` : `${projLbl}:`;
  };
  selBG.addEventListener('change', async () => {
    const transitionId = selBG.value;
    if (!transitionId) {
      item.selectedBgTransition = '';
      lblBG.textContent = bgLabelBase();
      lblBG.style.color = '';
      return;
    }
    const estadoNombre = selBG.options[selBG.selectedIndex]?.textContent || 'estado';
    selBG.disabled    = true;
    lblBG.textContent = `${bgLabelBase()} Aplicando...`;
    lblBG.style.color = '';
    try {
      const r = await fetch(`${JIRA_BASE}/rest/api/3/issue/${issue.key}/transitions`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
        body:    JSON.stringify({ transition: { id: transitionId } })
      });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      item.bgTransitionAplicada = true;
      item.selectedBgTransition = '';
      item.bgCurrentStatus      = estadoNombre;
      lblBG.textContent = `${projLbl} (${estadoNombre}) ✓`;
      lblBG.style.color = '#059669';
    } catch (e) {
      item.selectedBgTransition = '';
      selBG.value       = '';

      lblBG.style.color = 'var(--red)';
    } finally {
      selBG.disabled = false;

  rowBG.appendChild(lblBG);
  rowBG.appendChild(selBG);
  secEstado.appendChild(rowBG);

  sections.appendChild(secEstado);

  // 4. Botón Previsualizar
  const btnPreview = document.createElement('button');
  btnPreview.className = 'btn-preview-card';
  btnPreview.innerHTML = `<svg fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>Previsualizar`;
  btnPreview.addEventListener('click', () => abrirModalPreview(key));
  sections.appendChild(btnPreview);

  // 5. Agregar tarea en BG (sólo en el flujo BG; no aplica a otros proyectos)
  if (proyectoFiltroActivo() === APP_CONFIG.projects.bug) {
    const secTareasBG = document.createElement('div');
    secTareasBG.className = 'tarea-bg-section';
    const btnAgregarBG = document.createElement('button');
    btnAgregarBG.className = 'btn-agregar-bg';
    btnAgregarBG.type      = 'button';
    btnAgregarBG.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Agregar tarea en ${APP_CONFIG.projects.bug}`;
    btnAgregarBG.addEventListener('click', e => {
      e.stopPropagation();
      agregarTareaBGPendiente(issue, secTareasBG);
    });
    sections.appendChild(btnAgregarBG);
    sections.appendChild(secTareasBG);
  }

  info.appendChild(sections);

  return wrap;
}

function abrirPreviewArchivo(file) {
  const blobUrl = URL.createObjectURL(file);
  const overlay = document.createElement('div');
  overlay.className = 'preview-file-overlay';
  overlay.addEventListener('click', e => {
    if (e.target === overlay) { overlay.remove(); URL.revokeObjectURL(blobUrl); }
  });

  const box = document.createElement('div');
  box.className = 'preview-file-box';

  const btnClose = document.createElement('button');
  btnClose.className   = 'preview-file-close';
  btnClose.textContent = '✕';
  btnClose.addEventListener('click', () => { overlay.remove(); URL.revokeObjectURL(blobUrl); });

  const isImage = file.type.startsWith('image/');
  const isPdf   = file.type === 'application/pdf';

  if (isImage) {
    const img = document.createElement('img');
    img.src       = blobUrl;
    img.className = 'preview-file-full-img';
    box.appendChild(img);
  } else if (isPdf) {
    const embed = document.createElement('embed');
    embed.src    = blobUrl;
    embed.type   = 'application/pdf';
    embed.className = 'preview-file-embed';
    box.appendChild(embed);
  } else {
    const p = document.createElement('p');
    p.style.cssText = 'color:var(--text);padding:24px;text-align:center;';
    p.textContent = file.name;
    const a = document.createElement('a');
    a.href      = blobUrl;
    a.download  = file.name;
    a.textContent = 'Descargar';
    a.style.cssText = 'display:block;margin-top:12px;color:var(--accent);';
    box.appendChild(p);
    box.appendChild(a);
  }

  box.appendChild(btnClose);
  overlay.appendChild(box);
  document.body.appendChild(overlay);
}

function makeFilePreview(file, item, container) {
  const wrapper = document.createElement('div');
  wrapper.className = 'preview-item';

  const isImage = file.type.startsWith('image/');

  if (isImage) {
    const img = document.createElement('img');
    img.alt   = file.name;
    img.title = file.name;
    img.style.cursor = 'zoom-in';
    const url = URL.createObjectURL(file);
    img.src = url;
    img.onload = () => URL.revokeObjectURL(url);
    img.addEventListener('click', () => abrirPreviewArchivo(file));
    wrapper.appendChild(img);
  } else {
    const fileDiv = document.createElement('div');
    fileDiv.className    = 'preview-file';
    fileDiv.style.cursor = 'pointer';
    fileDiv.title        = file.name;
    fileDiv.innerHTML = `<svg fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`;
    const nameEl = document.createElement('div');
    nameEl.className   = 'preview-file-name';
    nameEl.textContent = file.name;
    fileDiv.appendChild(nameEl);
    fileDiv.addEventListener('click', () => abrirPreviewArchivo(file));
    wrapper.appendChild(fileDiv);
  }

  const btnRemove = document.createElement('button');
  btnRemove.className = 'btn-remove-preview';
  btnRemove.textContent = '✕';
  btnRemove.title = 'Quitar archivo';
  btnRemove.addEventListener('click', () => {
    const idx = item.adjuntosNuevos.indexOf(file);
    if (idx !== -1) item.adjuntosNuevos.splice(idx, 1);
    wrapper.remove();
  });

  wrapper.appendChild(btnRemove);
  return wrapper;
}

function makeEmptyState(msg) {

function abrirModalPreview(key) {
  const issue = bugs[key];
  const item  = colaItems[key];
  const f     = issue.fields;

  const priority = f.priority?.name || 'Medium';
  const reporter = f.reporter?.displayName || '—';
  const assignee = f.assignee?.displayName || 'Sin asignar';

  const labels   = (f.labels || []).join(', ') || '—';
  const resultados = item.resultadosObtenidos.trim();

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });

  const container = document.createElement('div');
  container.className = 'modal-container';

  // Header
  const header = document.createElement('div');
  header.className = 'modal-header';
  const h2 = document.createElement('h2');
  h2.textContent = f.summary || key;
  const btnClose = document.createElement('button');
  btnClose.className   = 'btn-modal-close';
  btnClose.textContent = '✕';
  btnClose.addEventListener('click', () => overlay.remove());
  header.appendChild(h2);
  header.appendChild(btnClose);

  // Body
  const body = document.createElement('div');
  body.className = 'modal-body';

  // Detalles
  const secDetalles = document.createElement('div');
  secDetalles.innerHTML = `<div class="modal-section-title">Detalles clave</div>`;
  const table = document.createElement('table');
  table.className = 'modal-table';
  [
    ['Origen',        key],
    ['Prioridad',     priority],
    ['Reportado por', reporter],
    ['Asignado a',    assignee],
    ['Estado',        f.status?.name || '—'],
    ['Creado',        created],
    ['Labels',        labels],
  ].forEach(([label, value]) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<th>${esc(label)}</th><td>${esc(value)}</td>`;
    table.appendChild(tr);
  });
  secDetalles.appendChild(table);
  body.appendChild(secDetalles);

  // Descripción original
  const secDesc = document.createElement('div');
  secDesc.innerHTML = `<div class="modal-section-title">Descripción</div>`;
  const descText = extraerTextoADF(f.description);
  const descDiv = document.createElement('div');
  descDiv.className = 'modal-resultados' + (descText ? '' : ' empty');
  descDiv.textContent = descText || 'Sin descripción.';
  secDesc.appendChild(descDiv);
  body.appendChild(secDesc);

  // Resultados obtenidos
  const secResultados = document.createElement('div');
  secResultados.innerHTML = `<div class="modal-section-title">Resultados obtenidos</div>`;
  const resultDiv = document.createElement('div');
  resultDiv.className = 'modal-resultados' + (resultados ? '' : ' empty');
  resultDiv.textContent = resultados || 'Sin resultados registrados.';
  secResultados.appendChild(resultDiv);
  body.appendChild(secResultados);

  // Adjuntos nuevos
  const secAdjNuevos = document.createElement('div');
  secAdjNuevos.innerHTML = `<div class="modal-section-title">Adjuntos nuevos</div>`;
  const listNuevos = document.createElement('div');
  listNuevos.className = 'modal-adjuntos-list';
  if (item.adjuntosNuevos.length === 0) {
    listNuevos.innerHTML = '<span class="modal-empty-list">Sin adjuntos nuevos.</span>';
  } else {
    item.adjuntosNuevos.forEach(file => {
      const el = document.createElement('div');
      el.className = 'modal-adjunto-item';
      el.innerHTML = `<svg fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>${esc(file.name)}`;
      listNuevos.appendChild(el);
    });
  }
  secAdjNuevos.appendChild(listNuevos);
  body.appendChild(secAdjNuevos);

  // Adjuntos originales del bug en BG (se copian automáticamente)
  const secAdjOriginales = document.createElement('div');
  secAdjOriginales.innerHTML = `<div class="modal-section-title">Adjuntos originales ${APP_CONFIG.projects.bug} (se copian automáticamente)</div>`;
  const listOriginales = document.createElement('div');
  listOriginales.className = 'modal-adjuntos-list';
  listOriginales.innerHTML = '<span class="modal-empty-list">Cargando adjuntos...</span>';
  secAdjOriginales.appendChild(listOriginales);
  body.appendChild(secAdjOriginales);

  (async () => {
    try {
      const attRes = await fetch(`${JIRA_BASE}/rest/api/3/issue/${key}?fields=attachment`, {
        headers: { Accept: 'application/json' }
      });
      if (!attRes.ok) throw new Error();
      const attData  = await attRes.json();
      const atts     = attData.fields?.attachment || [];
      listOriginales.innerHTML = '';
      if (atts.length === 0) {
        listOriginales.innerHTML = '<span class="modal-empty-list">Sin adjuntos originales.</span>';

      }
      const grid = document.createElement('div');
      grid.style.cssText = 'display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;';
      for (const att of atts) {
        const isImg = att.mimeType && att.mimeType.startsWith('image/');

          img.alt = att.filename;
          img.title = att.filename;
          img.addEventListener('mouseenter', () => { img.style.opacity = '.8'; });
          img.addEventListener('mouseleave', () => { img.style.opacity = '1'; });
          fetch(`${JIRA_BASE}/rest/api/3/attachment/content/${att.id}`)
            .then(r => r.ok ? r.blob() : null)
            .then(blob => {
              if (blob) {
                const blobUrl = URL.createObjectURL(blob);
                img.src = blobUrl;
                img.addEventListener('click', () => abrirLightbox(blobUrl, att.filename));
              }
            })
            .catch(() => {});
          cell.appendChild(img);
        } else {
          const icon = document.createElement('div');
          icon.className = 'preview-file';
          icon.innerHTML = `<svg fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`;
          cell.appendChild(icon);
        }
        const name = document.createElement('div');
        name.style.cssText = 'font-size:10px;color:var(--muted);text-align:center;word-break:break-all;max-width:80px;line-height:1.3;';
        name.textContent = att.filename;
        cell.appendChild(name);
        grid.appendChild(cell);
      }
      listOriginales.appendChild(grid);
    } catch {
      listOriginales.innerHTML = '<span class="modal-empty-list">Error al cargar adjuntos.</span>';
    }
  })();

  // Footer
  const footer = document.createElement('div');
  footer.className = 'modal-footer';
  const btnCerrar = document.createElement('button');
  btnCerrar.className   = 'btn-modal-cerrar';
  btnCerrar.textContent = 'Cerrar';
  btnCerrar.addEventListener('click', () => overlay.remove());
  footer.appendChild(btnCerrar);

  container.appendChild(header);
  container.appendChild(body);
  container.appendChild(footer);
  overlay.appendChild(container);
  document.body.appendChild(overlay);
}

// ── Drag & Drop ───────────────────────────────────────────────────────────────

function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.getElementById('drop-zone').classList.add('drag-over');
}

function onDragLeave(e) {
  if (!document.getElementById('drop-zone').contains(e.relatedTarget)) {
    document.getElementById('drop-zone').classList.remove('drag-over');
  }
}

function onDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('drag-over');
  if (!dragKey || queue.includes(dragKey)) return;
  addToQueue(dragKey);
  dragKey = null;
}

function addToQueue(key) {
  if (queue.includes(key)) return;
  queue.push(key);

  colaItems[key] = {
    resultadosObtenidos:    '',
    adjuntosNuevos:         [],
    bgTransitions:          [],
    selectedBgTransition:   '',
    bgTransitionAplicada:   false,
    bgCurrentStatus:        null,
    resultadoVerificacion:  '',
    marcarFinalizada:       false,
    agregarAlEpic:          false
  };

  const pendingCard = document.querySelector(`#pending-body .bug-card[data-key="${key}"]`);
  if (pendingCard) pendingCard.remove();

  const dz = document.getElementById('drop-zone');
  dz.classList.add('has-items');

  const issue = bugs[key];
  dz.appendChild(makeQueueCard(issue));

  // Fetch unificado: status actual + transiciones BG + check de link al epic
  fetch(`${JIRA_BASE}/rest/api/3/issue/${key}?fields=status,issuelinks&expand=transitions`, {
    headers: { Accept: 'application/json' }
  }).then(r => r.ok ? r.json() : null).then(data => {
    if (!data) {
      const sel = document.getElementById(`bg-transition-${key}`);
      if (sel) { sel.innerHTML = '<option value="">— No disponible —</option>'; }
      return;
    }

    // 1) Transiciones BG + estado actual
    const transitions   = data.transitions || [];
    const estadoActual  = data.fields?.status?.name || null;
    colaItems[key].bgTransitions   = transitions;
    colaItems[key].bgCurrentStatus = estadoActual;

    const sel = document.getElementById(`bg-transition-${key}`);
    if (sel) {
      if (transitions.length) {
        sel.innerHTML = '<option value="">— No cambiar —</option>' +
          transitions.map(t => `<option value="${esc(t.id)}">${esc(t.name)}</option>`).join('');
        sel.disabled = false;
      } else {
        sel.innerHTML = '<option value="">— Sin transiciones —</option>';
      }
    }

    const lbl = document.querySelector(`#drop-zone .bug-card[data-key="${key}"] .estado-row-label`);
    if (lbl && estadoActual) {
      lbl.textContent = `${key.split('-')[0]} (${estadoActual}):`;
    }

    // 2) Check de link al Epic
    const issuelinks = data.fields?.issuelinks || [];
    const yaEnlazado = issuelinks.some(l =>
      l.inwardIssue?.key === QAA_PARENT || l.outwardIssue?.key === QAA_PARENT
    );
    if (yaEnlazado) {
      colaItems[key].agregarAlEpic = true;
      const chk = document.getElementById(`epic-link-${key}`);
      if (chk) {
        chk.checked  = true;
        chk.disabled = true;
        const epicLbl = chk.nextElementSibling;
        if (epicLbl) { epicLbl.textContent = 'Ya enlazado al Epic ✓'; epicLbl.style.color = '#059669'; }
      }
    }
  }).catch(() => {
    const sel = document.getElementById(`bg-transition-${key}`);
    if (sel) { sel.innerHTML = '<option value="">— No disponible —</option>'; }
  });

  updatePendingCount();
  updateQueueCount();
  updateSubmitBtn();
}

function removeFromQueue(key, volverAPendientes = true) {
  const idx = queue.indexOf(key);
  if (idx === -1) return;
  queue.splice(idx, 1);
  delete colaItems[key];

  const queueCard = document.querySelector(`#drop-zone .bug-card[data-key="${key}"]`);
  if (queueCard) queueCard.remove();

  if (queue.length === 0) {
    const dz = document.getElementById('drop-zone');
    dz.classList.remove('has-items');
    dz.innerHTML = `
      <svg fill="none" stroke-width="1.5" viewBox="0 0 24 24">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <span>Arrastrá bugs aquí</span>`;
    dz.setAttribute('ondragover', 'onDragOver(event)');
    dz.setAttribute('ondragleave', 'onDragLeave(event)');
    dz.setAttribute('ondrop', 'onDrop(event)');
  }

  if (volverAPendientes) {
    const issue = bugs[key];
    if (issue) {
      const body = document.getElementById('pending-body');
      const emptyState = body.querySelector('.state-empty, .state-error');
      if (emptyState) emptyState.remove();
      body.appendChild(makePendingCard(issue));
    }
  }

  updatePendingCount();
  updateQueueCount();
  updateSubmitBtn();
}

// ── Tarea BG extra ────────────────────────────────────────────────────────────

function agregarTareaBGPendiente(issue, container) {
  const f    = issue.fields;
  const tarea = { titulo: '', notas: '', adjuntos: [] };
  const uid   = `tarea-bg-p-${issue.key}-${Date.now()}`;

  const wrap = document.createElement('div');
  wrap.className = 'tarea-bg-item';

  const header = document.createElement('div');
  header.className = 'tarea-bg-item-header';
  const lbl = document.createElement('span');
  lbl.textContent = `Nueva tarea ${APP_CONFIG.projects.bug}`;
  const btnRm = document.createElement('button');
  btnRm.className   = 'btn-remove-tarea-bg';
  btnRm.type        = 'button';
  btnRm.textContent = '✕';
  btnRm.addEventListener('click', e => { e.stopPropagation(); wrap.remove(); });
  header.appendChild(lbl);
  header.appendChild(btnRm);

  const inputTitulo = document.createElement('input');
  inputTitulo.type        = 'text';
  inputTitulo.placeholder = 'Título de la tarea';
  inputTitulo.addEventListener('input', () => { tarea.titulo = inputTitulo.value; });

  const inputNotas = document.createElement('textarea');
  inputNotas.placeholder = 'Notas / descripción (opcional)';
  inputNotas.rows = 2;
  inputNotas.addEventListener('input', () => { tarea.notas = inputNotas.value; });

  const adjLabel = document.createElement('label');
  adjLabel.className = 'adjuntos-input-label';
  adjLabel.htmlFor   = uid;
  adjLabel.style.marginTop = '2px';
  adjLabel.innerHTML = `<svg fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>Adjuntar archivos`;

  const adjInput = document.createElement('input');
  adjInput.type     = 'file';
  adjInput.id       = uid;
  adjInput.multiple = true;
  adjInput.accept   = 'image/*,.pdf';
  adjInput.style.display = 'none';

  const adjPreviews = document.createElement('div');
  adjPreviews.className = 'adjuntos-previews';

  adjInput.addEventListener('change', () => {
    Array.from(adjInput.files).forEach(file => {
      tarea.adjuntos.push(file);
      adjPreviews.appendChild(makeFilePreview(file, { adjuntosNuevos: tarea.adjuntos }, adjPreviews));
    });
    adjInput.value = '';
  });

  const btnCrear = document.createElement('button');
  btnCrear.className   = 'btn-agregar-bg';
  btnCrear.type        = 'button';
  btnCrear.style.cssText = 'border-style:solid;background:var(--g1);color:var(--g8);border-color:var(--g4);margin-top:4px;';
  btnCrear.textContent = `Crear en ${APP_CONFIG.projects.bug}`;
  btnCrear.addEventListener('click', async e => {
    e.stopPropagation();
    if (!tarea.titulo.trim()) { inputTitulo.focus(); return; }

    btnCrear.textContent = 'Creando...';
    btnCrear.disabled    = true;
    try {
      const bgPayload = {
        fields: {
          project:   { key: APP_CONFIG.projects.bug },
          summary:   tarea.titulo.trim(),
          issuetype:   { name: 'Tarea' },
          labels:      ['qa-reported'],
          ...(f.priority?.name      ? { priority: { name: f.priority.name } }             : {}),
          ...(f.assignee?.accountId ? { assignee: { accountId: f.assignee.accountId } }   : {}),
          ...(tarea.notas.trim()    ? { description: { type:'doc', version:1, content:[
            mkPanel('note', [
              mkH('Notas'),
              mkP(tarea.notas.trim()),
              mkRule(),
              mkIssueRef('Vinculada a: ', issue.key),
            ])
          ]}} : {})
        }
      };
      console.log(`[BG] Payload → tarea de ${issue.key}:`, JSON.stringify(bgPayload, null, 2));

      const bgR = await fetch(`${JIRA_BASE}/rest/api/3/issue`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
        body: JSON.stringify(bgPayload)
      });
      if (!bgR.ok) {
        const errBody = await bgR.text();
        console.error(`[BG ERROR ${bgR.status}]:`, errBody);
        let errMsg = `HTTP ${bgR.status}`;
        try {
          const errData = JSON.parse(errBody);
          const msgs = [...(errData.errorMessages || [])];
          Object.values(errData.errors || {}).forEach(v => { if (!msgs.includes(v)) msgs.push(v); });
          if (msgs.length) errMsg = msgs.join(' · ');
        } catch {}
        throw new Error(errMsg);
      }
      const bgCreated = await bgR.json();
      const bgNewKey  = bgCreated.key;
      console.log(`[BG] Tarea creada: ${bgNewKey}`);

      // Link: nuevo BG Bug ↔ BG bug origen (el que está en la cola)
      await fetch(`${JIRA_BASE}/rest/api/3/issueLink`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
        body: JSON.stringify({ type: { name: 'Relates' }, inwardIssue: { key: bgNewKey }, outwardIssue: { key: issue.key } })
      }).catch(e => console.error('[LINK BG↔BG ERROR]', e));

      // Link: nuevo BG Bug ↔ QAA-172 (epic padre en QAA)
      await fetch(`${JIRA_BASE}/rest/api/3/issueLink`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
        body: JSON.stringify({ type: { name: 'Relates' }, inwardIssue: { key: bgNewKey }, outwardIssue: { key: QAA_PARENT } })
      }).catch(e => console.error('[LINK BG↔QAA ERROR]', e));

      for (const file of tarea.adjuntos) {
        try {
          const fd = new FormData();
          fd.append('file', file, file.name);
          await fetch(`${JIRA_BASE}/rest/api/3/issue/${bgNewKey}/attachments`, {
            method: 'POST', headers: { 'X-Atlassian-Token': 'no-check' }, body: fd
          });
        } catch {}
      }

      wrap.innerHTML = '';
      const badge = document.createElement('a');
      badge.href        = `${APP_CONFIG.jira.browseUrl}${esc(bgNewKey)}`;
      badge.target      = '_blank';
      badge.className   = 'card-result-badge badge-ok';
      badge.style.cssText = 'display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:5px;background:#dcfce7;color:#166534;border:1px solid #86efac;font-size:11px;font-weight:700;text-decoration:none;';
      badge.textContent = `${bgNewKey} ✓`;
      wrap.appendChild(badge);
    } catch(err) {
      const errMsg = err.message || 'Error desconocido';
      btnCrear.textContent = 'Reintentar';
      btnCrear.disabled    = false;
      let errEl = wrap.querySelector('.tarea-bg-error');
      if (!errEl) {
        errEl = document.createElement('div');
        errEl.className = 'tarea-bg-error';
        errEl.style.cssText = 'font-size:10px;color:var(--red);padding:4px 8px;background:var(--red-bg);border:1px solid var(--red-b);border-radius:5px;word-break:break-word;margin-top:4px;';
        wrap.appendChild(errEl);
      }
      errEl.textContent = errMsg;
    }
  });

  wrap.appendChild(header);
  wrap.appendChild(inputTitulo);
  wrap.appendChild(inputNotas);
  wrap.appendChild(adjLabel);
  wrap.appendChild(adjInput);
  wrap.appendChild(adjPreviews);
  wrap.appendChild(btnCrear);
  container.appendChild(wrap);
}
